                                <i className="ph-fill ph-check-circle text-3xl text-green-600 mr-3"></i>
                                <h2 className="text-2xl font-bold text-gray-800">報名成功</h2>
                            </div>
                            <div className="p-6 space-y-5">
                                <p className="text-gray-700 leading-7">
                                    感謝您填寫校車報名資料。如需確認填寫內容，請點選「查詢報名」查看。
                                </p>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    <button type="button" onClick={() => setSubmittedOk(false)} className="w-full rounded-xl bg-indigo-600 px-4 py-3 font-bold text-white shadow hover:bg-indigo-700 transition">
                                        繼續填寫另一位學生
                                    </button>
                                    <button type="button" onClick={() => ctx.setCurrentPage('lookup')} className="w-full rounded-xl border border-indigo-200 bg-indigo-50 px-4 py-3 font-bold text-indigo-700 hover:bg-indigo-100 transition">
                                        查詢報名
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto p-3 sm:p-4 transition-all duration-500">
                    <div className="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                        <div className="bg-indigo-50 p-6 border-b border-gray-100 flex flex-wrap items-center gap-3">
                            <div className="flex items-center min-w-0">
                                <i className="ph-fill ph-user-plus text-2xl text-indigo-600 mr-2 shrink-0"></i>
                                <h2 className="text-xl font-bold text-gray-800">學生搭車報名表</h2>
                            </div>
                            <span className="max-w-full truncate rounded-full bg-indigo-100 px-3 py-1 text-xs font-bold text-indigo-700 ring-1 ring-indigo-200" title={activeSessionName}>{activeSessionName}</span>
                        </div>
                        <form onSubmit={handleSubmit} className="p-4 sm:p-6 space-y-6">
                            {isRegistrationClosed && (
                                <div className="rounded-xl border border-red-200 bg-red-50 p-4 text-sm font-bold leading-6 text-red-700">
                                    <i className="ph-fill ph-lock-key mr-1"></i>{registrationClosedText}
                                </div>
                            )}
                            <div className="rounded-xl border border-blue-100 bg-blue-50 p-4 text-sm leading-6 text-blue-900 whitespace-pre-line">
                                <div className="mb-1 flex items-center font-bold text-blue-800"><i className="ph-fill ph-info text-lg mr-1"></i>報名前請先閱讀</div>
                                {registrationNotice}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="space-y-4 md:col-span-2">
                                    <h3 className="text-sm font-semibold text-indigo-600 border-l-4 border-indigo-600 pl-2">基本與聯絡資料</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div><label className="block text-xs text-gray-500 mb-1">班級</label><input required type="text" pattern="(?:[789][0-9]{2}|新生)" title="請填 701、808、911 這類三碼格式；尚未編班請填新生" placeholder="例如：701、808、911；未編班填新生" value={formData.class} onChange={e => setFormData({...formData, class: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /><p className="mt-1 text-[11px] leading-4 text-indigo-600">請使用七、八、九年級格式；七年級尚未編班請填「新生」。</p></div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div><label className="block text-xs text-gray-500 mb-1">學號</label><input required type="text" placeholder="學號" value={formData.sid} onChange={e => setFormData({...formData, sid: e.target.value})} className="w-full min-w-0 px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                            <div><label className="block text-xs text-gray-500 mb-1">座號</label><input required type="number" placeholder="座號" value={formData.seat} onChange={e => setFormData({...formData, seat: e.target.value})} className="w-full min-w-0 px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                        </div>
                                        <div><label className="block text-xs text-gray-500 mb-1">出生日期（西元）</label><input required type="date" value={formData.birthDate} onChange={e => setFormData({...formData, birthDate: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /><p className="mt-1 text-[11px] leading-4 text-indigo-600">請依學務資料填寫，例如 2013-11-13。</p></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">姓名</label><input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">性別</label><select value={formData.gender} onChange={e => setFormData({...formData, gender: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white"><option value="男">男</option><option value="女">女</option></select></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">監護人姓名</label><input required type="text" value={formData.parentName} onChange={e => setFormData({...formData, parentName: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">監護人手機</label><input required type="text" value={formData.parentMobile} onChange={e => setFormData({...formData, parentMobile: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">學生本人手機 (選填)</label><input type="text" value={formData.mobile} onChange={e => setFormData({...formData, mobile: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">住家室內電話 (選填)</label><input type="text" value={formData.homePhone} onChange={e => setFormData({...formData, homePhone: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                    </div>
                                </div>
                                <div className="space-y-4 md:col-span-2 pt-4 border-t border-gray-100">
                                    <h3 className="text-sm font-semibold text-indigo-600 border-l-4 border-indigo-600 pl-2">搭車路線設定</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs text-gray-500 mb-1">路線</label>
                                            <select value={formData.routeId} onChange={e => { const r = ctx.activeRoutes.find(rt => rt.id === e.target.value); setFormData({...formData, routeId: e.target.value, stopName: r?.stops[0] || ''}); }} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white">
                                                {ctx.activeRoutes.map(r => {
                                                    const count = ctx.canSeeRoster ? (ctx.routeCounts[r.id] || 0) : null;
                                                    const isFull = r.capacity && count !== null && count >= r.capacity;
                                                    return <option key={r.id} value={r.id} disabled={isFull}>{r.name}{isFull ? ' - 已額滿' : ''}</option>
                                                })}
                                            </select>
                                        </div>
                                        <div><label className="block text-xs text-gray-500 mb-1">車站</label><select value={formData.stopName} onChange={e => setFormData({...formData, stopName: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white">{selectedRoute?.stops?.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                                    </div>
                                    <div>
                                        <label className="block text-xs text-gray-500 mb-1">乘車／座位備註（選填）</label>
                                        <textarea value={formData.seatNote} onChange={e => setFormData({...formData, seatNote: e.target.value})} rows="2" placeholder="例如：容易暈車需坐前排、兄弟姊妹希望坐附近、車上幹部、其他排座提醒" className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none text-sm" />
                                    </div>
                                </div>
                                <div className="space-y-4 md:col-span-2 pt-4 border-t border-gray-100">
                                    <h3 className="text-sm font-bold text-red-600 border-l-4 border-red-600 pl-2">固定不搭車時段 (選填)</h3>
                                    <p className="text-xs text-gray-500">系統預設為「全勤搭車」。若學生有固定補習或家長接送，請將「不搭車」的時段<strong className="text-red-600">打勾</strong>，點名時將自動排除。</p>
                                    <div className="bg-red-50 border border-red-100 rounded-xl p-4 overflow-x-auto no-scrollbar">
                                        <table className="w-full text-center text-sm min-w-[300px]">
                                            <thead><tr><th className="pb-2 text-gray-600 font-medium w-1/6">班次</th>{days.map(d => <th key={d.val} className="pb-2 text-gray-600 font-medium">{d.label}</th>)}</tr></thead>
                                            <tbody className="divide-y divide-red-100">
                                                <tr>
                                                    <td className="py-3 font-medium text-gray-700">上學</td>
                                                    {days.map(d => (
                                                        <td key={d.val} className="py-3">
                                                            <input type="checkbox" checked={!!formData.noRide[`${d.val}-morning`]} onChange={() => toggleNoRide(d.val, 'morning')} className="w-5 h-5 accent-red-500 cursor-pointer" />
                                                        </td>
                                                    ))}
                                                </tr>
                                                <tr>
                                                    <td className="py-3 font-medium text-gray-700">放學</td>
                                                    {days.map(d => (
                                                        <td key={d.val} className="py-3">
                                                            <input type="checkbox" checked={!!formData.noRide[`${d.val}-afternoon`]} onChange={() => toggleNoRide(d.val, 'afternoon')} className="w-5 h-5 accent-red-500 cursor-pointer" />
                                                        </td>
                                                    ))}
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                {surveyQuestions.length > 0 && (
                                    <div className="space-y-4 md:col-span-2 pt-4 border-t border-gray-100">
                                        <h3 className="text-sm font-semibold text-indigo-600 border-l-4 border-indigo-600 pl-2">本期自訂調查</h3>
                                        {surveyQuestions.map((q, idx) => {
                                            const selectedAnswer = formData.surveyAnswers[q.id] || q.options[0] || '';
                                            return (
                                                <div key={q.id} className="rounded-xl border border-indigo-100 bg-indigo-50/40 p-4 space-y-3">
                                                    <div>
                                                        <div className="text-sm font-bold text-gray-800">{idx + 1}. {q.title}</div>
                                                        {q.description && <p className="mt-1 text-xs text-gray-500">{q.description}</p>}
                                                    </div>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                        {q.options.map(opt => (
                                                            <label key={opt} className={`flex cursor-pointer items-center rounded-lg border px-3 py-2 text-sm transition ${selectedAnswer === opt ? 'border-indigo-400 bg-white text-indigo-800' : 'border-gray-200 bg-white/70 hover:bg-white'}`}>
                                                                <input type="radio" name={`survey-${q.id}`} value={opt} checked={selectedAnswer === opt} onChange={e => setFormData({...formData, surveyAnswers: {...formData.surveyAnswers, [q.id]: e.target.value}})} className="mr-2 accent-indigo-600" />
                                                                <span className="font-medium">{opt}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                    {q.noteEnabled && (
                                                        <div>
                                                            <label className="block text-xs font-bold text-gray-500 mb-1">{q.noteLabel}</label>
                                                            <textarea value={formData.surveyNotes[q.id] || ''} onChange={e => setFormData({...formData, surveyNotes: {...formData.surveyNotes, [q.id]: e.target.value}})} rows="2" placeholder="可補充活動名稱、尚未確定事項或其他交通備註" className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none text-sm" />
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                            <button type="submit" disabled={isSelectedRouteFull || isRegistrationClosed} className={`w-full py-3 rounded-xl font-bold shadow-lg transition flex items-center justify-center ${isSelectedRouteFull || isRegistrationClosed ? 'bg-gray-400 text-gray-200 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                {isRegistrationClosed ? <><i className="ph-bold ph-lock-key text-xl mr-2"></i>報名已關閉</> : isSelectedRouteFull ? <><i className="ph-bold ph-prohibit text-xl mr-2"></i>該路線已額滿，無法報名</> : '送出報名資料'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const NoRideVisualSummary = ({ noRide }) => {
            const days = [
                { val: 1, label: '一' },
                { val: 2, label: '二' },
                { val: 3, label: '三' },
                { val: 4, label: '四' },
                { val: 5, label: '五' }
            ];
            const shifts = [
                { key: 'morning', label: '上學', icon: 'ph-sun-horizon' },
                { key: 'afternoon', label: '放學', icon: 'ph-house-line' }
            ];
            const hasNoRide = noRide && Object.values(noRide).some(Boolean);

            return (
                <div className="sm:col-span-2 rounded-2xl border border-gray-100 bg-gradient-to-br from-white to-slate-50 p-4 shadow-sm">
                    <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
                        <div className="flex items-center gap-2">
                            <span className="flex h-8 w-8 items-center justify-center rounded-full bg-slate-900 text-white">
                                <i className="ph-fill ph-calendar-dots text-lg"></i>
                            </span>
                            <div>
                                <div className="text-sm font-bold text-gray-900">固定不搭車時段</div>
                                <div className="text-xs text-gray-500">綠色為搭車，紅色為固定不搭</div>
                            </div>
                        </div>
                        {!hasNoRide && (
                            <span className="rounded-full bg-emerald-50 px-3 py-1 text-xs font-bold text-emerald-700 ring-1 ring-emerald-100">
                                全勤搭車
                            </span>
                        )}
                    </div>
                    <div className="overflow-x-auto no-scrollbar">
                        <div className="min-w-[360px] rounded-xl border border-gray-100 bg-white p-3">
                            <div className="grid grid-cols-6 gap-2 text-center text-xs font-bold text-gray-500">
                                <div></div>
                                {days.map(day => <div key={day.val}>週{day.label}</div>)}
                            </div>
                            <div className="mt-2 space-y-2">
                                {shifts.map(shift => (
                                    <div key={shift.key} className="grid grid-cols-6 gap-2 items-center">
                                        <div className="flex items-center justify-center gap-1 rounded-lg bg-gray-50 px-2 py-2 text-xs font-bold text-gray-700">
                                            <i className={`ph-fill ${shift.icon}`}></i>
                                            {shift.label}
                                        </div>
                                        {days.map(day => {
                                            const disabled = !!noRide?.[`${day.val}-${shift.key}`];
                                            return (
                                                <div key={`${day.val}-${shift.key}`} className={`flex h-10 items-center justify-center rounded-xl border text-lg ${disabled ? 'border-rose-100 bg-rose-50 text-rose-600' : 'border-emerald-100 bg-emerald-50 text-emerald-600'}`} title={`週${day.label}${shift.label}${disabled ? '不搭車' : '搭車'}`}>
                                                    <i className={`ph-fill ${disabled ? 'ph-x-circle' : 'ph-check-circle'}`}></i>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const LookupPage = ({ ctx }) => {
            const [formData, setFormData] = useState({ parentName: '', parentMobile: '' });
            const [results, setResults] = useState([]);
            const [searched, setSearched] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleLookup = async (e) => {
                e.preventDefault();
                const parentName = normalizeText(formData.parentName);
                const parentMobile = normalizePhone(formData.parentMobile);
                if (!parentName || !parentMobile) {
                    return ctx.showMessage('請輸入監護人姓名與手機號碼', 'error');
                }
                setLoading(true);
                const lookupKey = await buildLookupKey(parentName, parentMobile);
                try {
                    const parentQuery = await ctx.findParentQueryByLookupKey(lookupKey);
                    const matched = Object.values(parentQuery?.students || {});
                    setResults(matched.sort((a, b) => getStudentOrderValue(a) - getStudentOrderValue(b)));
                    setSearched(true);
                } catch (err) {
                    console.error(err);
                    ctx.showMessage('查詢失敗，請稍後再試', 'error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-3xl mx-auto p-3 sm:p-4 transition-all duration-500">
                    <div className="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                        <div className="bg-sky-50 p-6 border-b border-gray-100 flex items-center">
                            <i className="ph-fill ph-magnifying-glass text-3xl text-sky-600 mr-3"></i>
                            <h2 className="text-2xl font-bold text-gray-800">查詢報名結果</h2>
                        </div>
                        <form onSubmit={handleLookup} className="p-4 sm:p-6 space-y-5">
                            <div className="rounded-xl border border-sky-100 bg-sky-50 p-4 text-sm leading-6 text-sky-900">
                                請輸入報名時填寫的監護人姓名與監護人手機。若同一位家長有多位孩子，系統會一併列出。
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 mb-1">監護人姓名</label>
                                    <input required type="text" value={formData.parentName} onChange={e => setFormData({...formData, parentName: e.target.value})} className="w-full px-3 py-3 border rounded-xl focus:ring-2 focus:ring-sky-500 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 mb-1">監護人手機</label>
                                    <input required type="tel" value={formData.parentMobile} onChange={e => setFormData({...formData, parentMobile: e.target.value})} className="w-full px-3 py-3 border rounded-xl focus:ring-2 focus:ring-sky-500 outline-none" />
                                </div>
                            </div>
                            <button type="submit" disabled={loading} className="w-full rounded-xl bg-sky-600 px-4 py-3 font-bold text-white shadow hover:bg-sky-700 transition disabled:bg-gray-400">
                                {loading ? '查詢中...' : '查詢'}
                            </button>
                        </form>
                    </div>

                    {searched && (
                        <div className="mt-4 space-y-3">
                            {results.length === 0 ? (
                                <div className="rounded-xl border border-gray-200 bg-white p-6 text-center text-gray-600 shadow-sm">
                                    <i className="ph-fill ph-info text-3xl text-gray-400"></i>
                                    <p className="mt-2 font-bold">查無報名資料</p>
                                    <p className="mt-1 text-sm leading-6">請確認監護人姓名與手機號碼是否與報名時填寫一致。若資料有誤，請重新填寫報名表或洽學務處確認。</p>
                                </div>
                            ) : (
                                results.map((student, idx) => {
                                    const routeName = ctx.routes.find(r => r.id === student.routeId)?.name || '未填寫';
                                    const questions = buildSurveyQuestions(ctx.appConfig);
                                    const parentEligibility = getParentEligibilityStatus(student.busEligibilityStatus);
                                    return (
                                        <div key={student.id} className="rounded-xl border border-sky-100 bg-white p-5 shadow-sm">
                                            <div className="flex flex-wrap items-center justify-between gap-2 border-b border-gray-100 pb-3">
                                                <div>
                                                    <div className="text-xs font-bold text-sky-600">查詢結果 {idx + 1}</div>
                                                    <h3 className="mt-1 text-xl font-bold text-gray-900">{student.name || '未填姓名'} <span className="text-sm font-medium text-gray-500">({student.gender || '未填性別'})</span></h3>
                                                </div>
                                                <div className="flex flex-wrap justify-end gap-2">
                                                    <span className="rounded-full bg-emerald-100 px-3 py-1 text-xs font-bold text-emerald-700">已送出報名</span>
                                                    <span className={`rounded-full px-3 py-1 text-xs font-bold ${parentEligibility.className}`}>資格狀態：{parentEligibility.label}</span>
                                                </div>
                                            </div>
                                            <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm leading-6">
                                                <div><span className="font-bold text-gray-500">班級座號：</span>{student.class || '未填班級'} 班 / {student.seat || '未填'} 號</div>
                                                <div><span className="font-bold text-gray-500">搭車路線：</span>{routeName} - {student.stopName || '未填車站'}</div>
                                                {questions.map((q, qIdx) => {
                                                    const answer = student.surveyAnswers?.[q.id] || (qIdx === 0 ? (student.returnBus || '') : '');
                                                    const note = student.surveyNotes?.[q.id] || (qIdx === 0 ? (student.returnNote || '') : '');
                                                    if (!answer && !note) return null;
                                                    return (
                                                        <div key={q.id} className="sm:col-span-2">
                                                            <span className="font-bold text-gray-500">{q.title}：</span>{answer || '未填'}
                                                            {note && <div className="mt-1 rounded-lg bg-gray-50 px-3 py-2 text-gray-600">備註：{note}</div>}
                                                        </div>
                                                    );
                                                })}
                                                {student.seatNote && <div className="sm:col-span-2"><span className="font-bold text-gray-500">乘車／座位備註：</span>{student.seatNote}</div>}
                                                <NoRideVisualSummary noRide={student.noRide} />
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const LeavePage = ({ ctx }) => {
            const formatInputDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };
            const today = formatInputDate(new Date());
            const [formData, setFormData] = useState({
                startDate: today,
                endDate: today,
                routeId: '',
                stopName: '',
                className: '',
                studentName: '',
                shifts: { morning: false, afternoon: false }
            });

            useEffect(() => {
                if (!formData.routeId && ctx.activeRoutes.length > 0) {
                    setFormData(prev => ({ ...prev, routeId: ctx.activeRoutes[0].id, stopName: ctx.activeRoutes[0].stops[0] }));
                }
            }, [ctx.activeRoutes]);

            const selectedRoute = ctx.activeRoutes.find(r => r.id === formData.routeId);

            const eachDateInRange = (startDate, endDate) => {
                const dates = [];
                const start = new Date(`${startDate}T00:00:00`);
                const end = new Date(`${endDate}T00:00:00`);
                for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                    dates.push(formatInputDate(d));
                }
                return dates;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!ctx.user) return;
                if (!formData.studentName.trim()) return ctx.showMessage('請輸入學生姓名', 'error');
                if (!formData.startDate || !formData.endDate) return ctx.showMessage('請選擇請假起迄日期', 'error');
                if (formData.endDate < formData.startDate) return ctx.showMessage('請假迄日不能早於起日', 'error');
                if (!formData.shifts.morning && !formData.shifts.afternoon) return ctx.showMessage('請至少勾選一個請假班次', 'error');
                const dates = eachDateInRange(formData.startDate, formData.endDate);
                if (dates.length > 60) return ctx.showMessage('一次請假最多 60 天，請縮短日期區間', 'error');
                const selectedShifts = ['morning', 'afternoon'].filter(shift => formData.shifts[shift]);
                const baseId = Date.now().toString();
                try {
                    const writes = [];
                    dates.forEach((date, dateIndex) => {
                        selectedShifts.forEach((shift, shiftIndex) => {
                            const newId = `${baseId}-${dateIndex}-${shiftIndex}`;
                            writes.push(setDoc(ctx.getDocRef('leaves', newId), {
                                ...formData,
                                id: newId,
                                date,
                                shift,
                                shifts: { morning: shift === 'morning', afternoon: shift === 'afternoon' },
                                studentName: formData.studentName.trim(),
                                className: formData.className.trim(),
                                createdAt: Date.now()
                            }));
                        });
                    });
                    await Promise.all(writes);
                    ctx.showMessage(`請假申請已連動至點名系統！共建立 ${writes.length} 筆請假紀錄`);
                    setFormData({
                        ...formData,
                        studentName: '',
                        className: '',
                        routeId: ctx.activeRoutes[0]?.id || '',
                        stopName: ctx.activeRoutes[0]?.stops[0] || '',
                        shifts: { morning: false, afternoon: false }
                    });
                } catch(err) { ctx.showMessage('連線錯誤', 'error'); }
            };

            return (
                <div className="max-w-xl mx-auto p-4 transition-all duration-500">
                    <div className="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                        <div className="bg-yellow-50 p-6 border-b border-gray-100 flex items-center"><i className="ph-fill ph-calendar-check text-2xl text-yellow-600 mr-2"></i><h2 className="text-xl font-bold text-gray-800">請假申請登記</h2></div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-6">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div><label className="block text-xs text-gray-500 mb-1">請假起日</label><input required type="date" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value, endDate: formData.endDate < e.target.value ? e.target.value : formData.endDate})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                <div><label className="block text-xs text-gray-500 mb-1">請假迄日</label><input required type="date" value={formData.endDate} min={formData.startDate} onChange={e => setFormData({...formData, endDate: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div><label className="block text-xs text-gray-500 mb-1">路線</label><select value={formData.routeId} onChange={e => { const r = ctx.activeRoutes.find(rt => rt.id === e.target.value); setFormData({...formData, routeId: e.target.value, stopName: r?.stops[0] || ''}); }} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white">{ctx.activeRoutes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select></div>
                                <div><label className="block text-xs text-gray-500 mb-1">車站</label><select value={formData.stopName} onChange={e => setFormData({...formData, stopName: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white">{selectedRoute?.stops?.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                                <div><label className="block text-xs text-gray-500 mb-1">班級 (如: 701)</label><input type="text" value={formData.className} onChange={e => setFormData({...formData, className: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                <div><label className="block text-xs text-gray-500 mb-1">學生姓名</label><input required type="text" value={formData.studentName} onChange={e => setFormData({...formData, studentName: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                            </div>

                            <div>
                                <label className="block text-xs text-gray-500 mb-2">請假班次</label>
                                <div className="flex space-x-6"><label className="flex items-center"><input type="checkbox" checked={formData.shifts.morning} onChange={e => setFormData({...formData, shifts: {...formData.shifts, morning: e.target.checked}})} className="w-5 h-5 accent-yellow-600" /><span className="ml-2 text-sm">上學</span></label><label className="flex items-center"><input type="checkbox" checked={formData.shifts.afternoon} onChange={e => setFormData({...formData, shifts: {...formData.shifts, afternoon: e.target.checked}})} className="w-5 h-5 accent-yellow-600" /><span className="ml-2 text-sm">放學</span></label></div>
                                <div className="mt-3 rounded-xl border border-yellow-100 bg-yellow-50 px-4 py-3 text-xs leading-6 text-yellow-900">
                                    <p className="font-bold">請勾選「需要請假、不搭校車」的班次。</p>
                                    <p>例：7/1 到 7/3 整天都不搭校車，請選 7/1 至 7/3，並勾選「上學」和「放學」。</p>
                                    <p>例：7/1 上學會搭車，但 7/1 放學到 7/3 放學都不搭，請分兩次送出：第一次填 7/1，只勾「放學」；第二次填 7/2 至 7/3，勾「上學」和「放學」。</p>
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-yellow-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-yellow-600 transition">送出請假</button>
                        </form>
                    </div>
                </div>
            );
        };

        const RollCallPage = ({ ctx }) => {
            const [filter, setFilter] = useState({ date: getLocalDateString(), shift: 'morning', routeId: '', stopName: 'all' });
            const [captainPwd, setCaptainPwd] = useState('');
            const [showPwd, setShowPwd] = useState(false);

            useEffect(() => {
                if (!filter.routeId && ctx.activeRoutes.length > 0) {
                    setFilter(prev => ({ ...prev, routeId: ctx.activeRoutes[0].id }));
                }
            }, [ctx.activeRoutes, filter.routeId]);

            if (!ctx.isAdminLoggedIn && !ctx.isCaptainLoggedIn) {
                return (
                    <div className="max-w-md mx-auto mt-12 p-4">
                        <div className="bg-white rounded-2xl shadow-xl overflow-hidden"><div className="bg-blue-600 p-6 text-white text-center"><i className="ph-fill ph-clipboard-text text-5xl mb-2"></i><h2 className="text-xl font-bold">車長點名系統</h2></div>
                            <form onSubmit={async (e) => {
                                e.preventDefault();
                                const inputHash = await hashPassword(captainPwd);
                                const isMatch = ctx.appConfig.rollCallPasswordHash && inputHash === ctx.appConfig.rollCallPasswordHash;
                                if (isMatch) { ctx.setIsCaptainLoggedIn(true); ctx.showMessage('車長驗證成功'); } else { ctx.showMessage('密碼錯誤', 'error'); }
                                setCaptainPwd('');
                            }} className="p-6 space-y-4">
                                <div className="relative">
                                    <input autoFocus type={showPwd ? "text" : "password"} placeholder="密碼..." value={captainPwd} onChange={e => setCaptainPwd(e.target.value)} className="w-full px-4 py-3 pr-12 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                                    <button type="button" onClick={() => setShowPwd(!showPwd)} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                                        <i className={`ph-bold ${showPwd ? 'ph-eye-slash' : 'ph-eye'} text-xl`}></i>
                                    </button>
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">進入</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const currentRoute = ctx.activeRoutes.find(r => r.id === filter.routeId);
            const routeStudents = ctx.studentsPublic.filter(s => s.routeId === filter.routeId);
            const displayedStudents = filter.stopName === 'all' ? routeStudents : routeStudents.filter(s => s.stopName === filter.stopName);
            const currentSeating = ctx.seatingArrangements[filter.routeId]?.seats || {};
            const rollCallClosed = ctx.appConfig.rollCallClosed === true;
            const rollCallStartDate = ctx.appConfig.rollCallStartDate || '';
            const rollCallEndDate = ctx.appConfig.rollCallEndDate || '';
            const isRollCallDateOpen = !rollCallClosed && isDateInRange(filter.date, rollCallStartDate, rollCallEndDate);
            const canEditRollCall = isRollCallDateOpen || ctx.isAdminLoggedIn;
            const rollCallPeriodText = rollCallStartDate || rollCallEndDate
                ? `${rollCallStartDate ? formatDateLabel(rollCallStartDate) : '未設定開始'} 至 ${rollCallEndDate ? formatDateLabel(rollCallEndDate) : '未設定結束'}`
                : '未限制日期';

            const checkLeaveMatch = (l, s) => {
                const lName = (l.studentName || '').trim(); const sName = (s.name || '').trim();
                const nameMatch = lName === sName || (lName && sName && lName.includes(sName));
                if (!nameMatch) return false;
                if (l.routeId && s.routeId && l.routeId !== s.routeId) return false;
                return true;
            };

            const leaveAppliesToShift = (leave, shift) => {
                if (leave.shift) return leave.shift === shift;
                if (leave.shifts && typeof leave.shifts === 'object') return !!leave.shifts[shift];
                return true;
            };

            const getStudentStatusData = (student) => {
                const dayOfWeek = new Date(filter.date).getDay();
                const isFixedNoRide = student.noRide && student.noRide[`${dayOfWeek}-${filter.shift}`];
                const isLeave = ctx.leaves.find(l => l.date === filter.date && checkLeaveMatch(l, student) && leaveAppliesToShift(l, filter.shift));
                const rec = ctx.attendanceRecords.find(r => r.date === filter.date && r.shift === filter.shift && r.routeId === filter.routeId && r.studentId === student.id);
                return { isFixedNoRide, isLeave, dbStatus: rec ? rec.status : null };
            };

            const rollCallSummary = routeStudents.reduce((acc, student) => {
                const { isFixedNoRide, isLeave, dbStatus } = getStudentStatusData(student);
                const isSkipped = !!isFixedNoRide || !!isLeave;
                acc.total += 1;
                if (isSkipped) acc.skipped += 1;
                else acc.required += 1;
                if (dbStatus === 'present') acc.present += 1;
                if (dbStatus === 'absent') acc.absent += 1;
                if (!isSkipped && !dbStatus) acc.pending += 1;
                return acc;
            }, { total: 0, required: 0, skipped: 0, present: 0, absent: 0, pending: 0 });

            const weekdayStats = [1, 2, 3, 4, 5].reduce((acc, day) => {
                acc.morning[day] = routeStudents.filter(s => !s.noRide || !s.noRide[`${day}-morning`]).length;
                acc.afternoon[day] = routeStudents.filter(s => !s.noRide || !s.noRide[`${day}-afternoon`]).length;
                return acc;
            }, { morning: {}, afternoon: {} });

            const handleMark = async (studentId, newStatus, currentStatus) => {
                if (!ctx.user) return;
                if (!canEditRollCall) {
                    ctx.showMessage('目前不在車長點名期間，無法送出點名', 'error');
                    return;
                }
                const recId = `${filter.date}-${filter.shift}-${filter.routeId}-${studentId}`;
                try {
                    if (currentStatus === newStatus) {
                        await deleteDoc(ctx.getDocRef('attendanceRecords', recId));
                    } else {
                        await setDoc(ctx.getDocRef('attendanceRecords', recId), { id: recId, date: filter.date, shift: filter.shift, routeId: filter.routeId, studentId, status: newStatus });
                    }
                } catch(err) { ctx.showMessage('同步失敗', 'error'); }
            };

            const handleBatchPresent = async () => {
                if (!ctx.user) return;
                if (!canEditRollCall) {
                    ctx.showMessage('目前不在車長點名期間，無法送出點名', 'error');
                    return;
                }
                ctx.showConfirm('確定將「尚未標記」且「今日應搭車」的學生全部設為出席嗎？', async () => {
                    ctx.showMessage('批次處理中，請稍候...');
                    const promises = [];
                    displayedStudents.forEach(student => {
                        const { isFixedNoRide, isLeave, dbStatus } = getStudentStatusData(student);
                        if (!isFixedNoRide && !isLeave && !dbStatus) {
                            const recId = `${filter.date}-${filter.shift}-${filter.routeId}-${student.id}`;
                            promises.push(setDoc(ctx.getDocRef('attendanceRecords', recId), {
                                id: recId, date: filter.date, shift: filter.shift, routeId: filter.routeId, studentId: student.id, status: 'present'
                            }));
                        }
                    });

                    try {
                        if(promises.length === 0) {
                            ctx.showMessage('目前沒有需要補齊點名的學生');
                            return;
                        }
                        await Promise.all(promises);
                        ctx.showMessage(`一鍵點名完成！共補齊 ${promises.length} 位學生`);
                    } catch(err) {
                        ctx.showMessage('部分資料同步失敗，請檢查網路', 'error');
                    }
                });
            };
            const deleteAttendanceRecords = async (records, successText) => {
                if (!ctx.user || !ctx.isAdminLoggedIn) return ctx.showMessage('只有老師後台權限可以清除點名紀錄', 'error');
                if (records.length === 0) return ctx.showMessage('目前沒有可清除的點名紀錄');
                try {
                    await Promise.all(records.map(r => deleteDoc(ctx.getDocRef('attendanceRecords', r.id))));
                    ctx.showMessage(successText);
                } catch (err) {
                    console.error(err);
                    ctx.showMessage('清除點名紀錄失敗，請檢查網路或 Firebase 權限', 'error');
                }
            };
            const getCurrentShiftRecords = () => ctx.attendanceRecords.filter(r => r.date === filter.date && r.shift === filter.shift);
            const handleClearAllRoutes = () => {
                const records = getCurrentShiftRecords();
                ctx.showConfirm(`確定清除 ${filter.date}「${filter.shift === 'morning' ? '上學' : '放學'}」全部路線的點名紀錄嗎？此動作只清除點名結果，不會刪報名資料。`, () => {
                    deleteAttendanceRecords(records, `已清除全部路線 ${records.length} 筆點名紀錄`);
                });
            };
            const handleClearCurrentRoute = () => {
                const records = getCurrentShiftRecords().filter(r => r.routeId === filter.routeId);
                ctx.showConfirm(`確定清除 ${currentRoute?.name || '目前路線'} ${filter.date}「${filter.shift === 'morning' ? '上學' : '放學'}」的點名紀錄嗎？`, () => {
                    deleteAttendanceRecords(records, `已清除目前路線 ${records.length} 筆點名紀錄`);
                });
            };
            const handleClearCurrentStop = () => {
                if (filter.stopName === 'all') return ctx.showMessage('請先選擇要清除的站點', 'error');
                const studentIds = new Set(routeStudents.filter(s => s.stopName === filter.stopName).map(s => s.id));
                const records = getCurrentShiftRecords().filter(r => r.routeId === filter.routeId && studentIds.has(r.studentId));
                ctx.showConfirm(`確定清除「${filter.stopName}」${filter.date}「${filter.shift === 'morning' ? '上學' : '放學'}」的點名紀錄嗎？`, () => {
                    deleteAttendanceRecords(records, `已清除 ${filter.stopName} ${records.length} 筆點名紀錄`);
                });
            };
            const handleClearStudentMark = (student) => {
                const records = getCurrentShiftRecords().filter(r => r.routeId === filter.routeId && r.studentId === student.id);
                deleteAttendanceRecords(records, `已清除 ${student.name || '該學生'} 的點名紀錄`);
            };

            return (
                <div className="max-w-7xl mx-auto p-4 space-y-6">
                    <div className="bg-white rounded-xl shadow-md p-6 border border-gray-100 grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">點名日期</label><input type="date" value={filter.date} onChange={e => setFilter({...filter, date: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none" /></div>
                        <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">班次</label><select value={filter.shift} onChange={e => setFilter({...filter, shift: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none"><option value="morning">上學班次</option><option value="afternoon">放學班次</option></select></div>
                        <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">路線</label><select value={filter.routeId} onChange={e => setFilter({...filter, routeId: e.target.value, stopName: 'all'})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none">{ctx.activeRoutes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select></div>
                        <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">站點</label><select value={filter.stopName} onChange={e => setFilter({...filter, stopName: e.target.value})} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white"><option value="all">全部站點</option>{(currentRoute?.stops || []).map(stop => <option key={stop} value={stop}>{stop}</option>)}</select></div>
                    </div>
                    {!isRollCallDateOpen && (
                        <div className="rounded-xl border border-amber-200 bg-amber-50 p-5 text-amber-900 shadow-sm">
                            <div className="flex items-start gap-3">
                                <i className="ph-fill ph-calendar-x text-3xl text-amber-600"></i>
                                <div>
                                    <h3 className="font-black">目前不在車長點名期間</h3>
                                    <p className="mt-1 text-sm leading-6">此期程設定的點名期間：{rollCallPeriodText}。若今天需要點名，請老師到後台「期程與表單」調整車長點名開放期間。</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
                            <div className="text-xs font-bold text-gray-500">本路線名單</div>
                            <div className="mt-1 text-2xl font-black text-gray-800">{rollCallSummary.total}</div>
                        </div>
                        <div className="bg-blue-50 rounded-xl border border-blue-100 shadow-sm p-4">
                            <div className="text-xs font-bold text-blue-700">今日應點名</div>
                            <div className="mt-1 text-2xl font-black text-blue-800">{rollCallSummary.required}</div>
                        </div>
                        <div className="bg-gray-50 rounded-xl border border-gray-200 shadow-sm p-4">
                            <div className="text-xs font-bold text-gray-600">自動跳過</div>
                            <div className="mt-1 text-2xl font-black text-gray-700">{rollCallSummary.skipped}</div>
                        </div>
                        <div className="bg-green-50 rounded-xl border border-green-100 shadow-sm p-4">
                            <div className="text-xs font-bold text-green-700">已到齊</div>
                            <div className="mt-1 text-2xl font-black text-green-800">{rollCallSummary.present}</div>
                        </div>
                        <div className="bg-red-50 rounded-xl border border-red-100 shadow-sm p-4">
                            <div className="text-xs font-bold text-red-700">未點 / 未到</div>
                            <div className="mt-1 text-2xl font-black text-red-800">{rollCallSummary.pending + rollCallSummary.absent}</div>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                        <div className="bg-teal-50 border-b border-teal-100 px-5 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1">
                            <h3 className="font-bold text-teal-800 flex items-center">
                                <i className="ph-fill ph-chart-bar text-xl mr-2"></i>本路線每日預估搭車人數
                            </h3>
                            <p className="text-xs text-teal-700">依報名表固定不搭車設定統計，不含臨時請假。</p>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full min-w-[560px] text-center">
                                <thead className="bg-gray-50 border-b">
                                    <tr>
                                        <th className="px-4 py-3 text-sm font-bold text-gray-600 text-left">班次</th>
                                        {['週一', '週二', '週三', '週四', '週五'].map(day => <th key={day} className="px-4 py-3 text-sm font-bold text-gray-600">{day}</th>)}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    <tr>
                                        <td className="px-4 py-4 text-left font-bold text-gray-800">上學</td>
                                        {[1, 2, 3, 4, 5].map(day => <td key={day} className="px-4 py-4 text-xl font-black text-teal-700">{weekdayStats.morning[day]}</td>)}
                                    </tr>
                                    <tr>
                                        <td className="px-4 py-4 text-left font-bold text-gray-800">放學</td>
                                        {[1, 2, 3, 4, 5].map(day => <td key={day} className="px-4 py-4 text-xl font-black text-teal-700">{weekdayStats.afternoon[day]}</td>)}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="flex flex-col lg:flex-row gap-6">
                        <div className="flex-1 flex flex-col gap-4">
                            <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-md border border-gray-100">
                                <h3 className="font-bold text-gray-800 flex items-center"><i className="ph-fill ph-list-checks text-xl mr-2 text-indigo-600"></i>搭車名單</h3>
                                <div className="flex flex-wrap justify-end gap-2">
                                    {ctx.isAdminLoggedIn && (
                                        <>
                                            <button onClick={handleClearAllRoutes} className="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-xs font-bold text-red-700 transition hover:bg-red-100"><i className="ph-bold ph-trash mr-1"></i>清空全部路線</button>
                                            <button onClick={handleClearCurrentRoute} className="rounded-lg border border-orange-200 bg-orange-50 px-3 py-2 text-xs font-bold text-orange-700 transition hover:bg-orange-100"><i className="ph-bold ph-eraser mr-1"></i>清空此路線</button>
                                            <button onClick={handleClearCurrentStop} disabled={filter.stopName === 'all'} className="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-xs font-bold text-amber-700 transition hover:bg-amber-100 disabled:cursor-not-allowed disabled:opacity-40"><i className="ph-bold ph-map-pin-line mr-1"></i>清空此站點</button>
                                        </>
                                    )}
                                    <button onClick={handleBatchPresent} disabled={!canEditRollCall} className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition flex items-center text-sm disabled:cursor-not-allowed disabled:bg-gray-300">
                                        <i className="ph-bold ph-check-double mr-2 text-lg"></i>一鍵全數到齊
                                    </button>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                                <table className="w-full text-left">
                                    <thead className="bg-gray-50 border-b"><tr><th className="px-6 py-3 text-sm font-semibold text-gray-600">學生資訊</th><th className="px-6 py-3 text-sm font-semibold text-gray-600">手動點名操作</th></tr></thead>
                                    <tbody className="divide-y divide-gray-50">
                                        {displayedStudents.map(student => {
                                            const { isFixedNoRide, isLeave, dbStatus } = getStudentStatusData(student);
                                            const isGreyOut = isFixedNoRide || isLeave;
                                            return (
                                                <tr key={student.id} className={`transition ${isGreyOut ? 'bg-gray-100/50 opacity-80' : 'hover:bg-indigo-50/30'}`}>
                                                    <td className="px-6 py-4">
                                                        <div className={`font-bold ${isGreyOut ? 'text-gray-500' : 'text-gray-800'}`}>{student.name}</div>
                                                        <div className="text-xs text-gray-500 mt-1">{student.class}班 | {student.stopName}</div>
                                                        {isFixedNoRide && <div className="mt-2 text-[11px] font-bold text-gray-500 bg-gray-200 inline-block px-2 py-0.5 rounded">系統判斷：報名表勾選不搭車</div>}
                                                        {!isFixedNoRide && isLeave && <div className="mt-2 text-[11px] font-bold text-yellow-700 bg-yellow-100 border border-yellow-200 inline-block px-2 py-0.5 rounded">系統提醒：已填寫請假申請</div>}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex flex-wrap gap-2">
                                                            <button onClick={() => handleMark(student.id, 'present', dbStatus)} disabled={!canEditRollCall} className={`w-12 h-12 rounded-lg border flex items-center justify-center transition disabled:cursor-not-allowed disabled:opacity-40 ${dbStatus === 'present' ? 'bg-green-500 text-white border-green-500 shadow-inner' : 'bg-white text-gray-400 hover:border-green-300'}`} title="設為已到"><i className="ph-bold ph-check text-2xl"></i></button>
                                                            <button onClick={() => handleMark(student.id, 'absent', dbStatus)} disabled={!canEditRollCall} className={`w-12 h-12 rounded-lg border flex items-center justify-center transition disabled:cursor-not-allowed disabled:opacity-40 ${dbStatus === 'absent' ? 'bg-red-500 text-white border-red-500 shadow-inner' : 'bg-white text-gray-400 hover:border-red-300'}`} title="設為未到"><i className="ph-bold ph-x text-2xl"></i></button>
                                                            {ctx.isAdminLoggedIn && (
                                                                <button onClick={() => handleClearStudentMark(student)} disabled={!dbStatus} className="h-12 rounded-lg border border-gray-200 bg-white px-3 text-xs font-bold text-gray-500 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-40" title="清除此學生點名紀錄">清除</button>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="w-full lg:w-96 bg-white rounded-xl shadow-md border border-gray-100 p-6 flex-shrink-0">
                            <h2 className="text-xl font-bold flex items-center mb-4"><i className="ph-fill ph-grid-four text-blue-600 mr-2"></i>即時座位對照表</h2>

                                <span className="flex items-center"><span className="w-3 h-3 rounded-full bg-green-400 mr-1"></span>已出席</span>
                                <span className="flex items-center"><span className="w-3 h-3 rounded-full bg-red-400 mr-1"></span>缺席</span>
                                <span className="flex items-center"><span className="w-3 h-3 rounded-full bg-gray-300 mr-1"></span>請假/不搭</span>
                            </div>
                            <div className="bg-gray-100 rounded-2xl p-4 border-4 border-gray-200 overflow-x-auto">
                                <div className="min-w-[280px] bg-white p-3 rounded-xl shadow-sm">
                                    <div className="w-full h-3 bg-gray-300 rounded-t-full mb-3"></div>

                                        {SHARED_SEAT_LAYOUT.map((item, i) => {

                                            if (item.type !== 'seat') return <div key={item.id} style={getSeatCellStyle(item)} className="flex h-full min-h-12 items-center justify-center bg-gray-200 border rounded-lg shadow-inner font-bold text-gray-600 text-xs">{item.label}</div>;

                                            const sd = currentSeating[item.id];
                                            const s = sd ? ctx.studentsPublic.find(st => st.id === sd.studentId) : null;

                                            let seatStyle = 'bg-white border-dashed border-gray-300 text-gray-300';
                                            if (s) {
                                                const { isFixedNoRide, isLeave, dbStatus } = getStudentStatusData(s);
                                                if (isFixedNoRide || isLeave) {
                                                    seatStyle = 'bg-gray-200 border-gray-400 text-gray-500 opacity-50';
                                                } else if (dbStatus === 'present') {
                                                    seatStyle = 'bg-green-100 border-green-400 text-green-800 shadow-inner ring-2 ring-green-400';
                                                } else if (dbStatus === 'absent') {
                                                    seatStyle = 'bg-red-100 border-red-400 text-red-800 shadow-inner ring-2 ring-red-400';
