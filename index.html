        const CHANGHUA_CITY_VILLAGES = [
            '磚磘里', '東芳里', '南安里', '莿桐里',
            '萬壽里', '民權里', '富貴里', '永生里',
            '西安里', '成功里', '彰安里', '福安里',
            '崙平里', '平和里', '西興里', '南瑤里', '南美里', '西勢里'
        ];
        const DEFAULT_ADDRESS_REGIONS = [

            { county: '彰化縣', district: '和美鎮', villages: [] },

        ];
        const normalizeAddressRegions = (regions) => {
            if (!Array.isArray(regions) || regions.length === 0) return DEFAULT_ADDRESS_REGIONS;

        };
        const addressRegionsToText = (regions) => normalizeAddressRegions(regions)
            .map(region => `${region.county}｜${region.district}｜${region.villages.join('、')}`)
            .join('\n');
        const addressRegionsFromText = (text) => String(text || '').split(/\n/).map(line => {
            const parts = line.split(/[|｜]/).map(part => part.trim());
            return { county: parts[0] || '', district: parts[1] || '', villages: (parts[2] || '').split(/[、,，]/).map(v => v.trim()).filter(Boolean) };
        }).filter(region => region.county && region.district);
        const SCHOOL_DISTRICT_VILLAGE_NOTES = {
            '萬壽里': '學區範圍：1至7鄰，請在詳細地址填寫鄰別。',
            '民權里': '學區範圍：7鄰以後，請在詳細地址填寫鄰別。',
            '富貴里': '學區範圍：1至10鄰，請在詳細地址填寫鄰別。',
            '永生里': '學區範圍：1至7鄰、15至20鄰，請在詳細地址填寫鄰別。',
            '西興里': '學區範圍：1至16鄰，請在詳細地址填寫鄰別。'
        };
        const PRIORITY_BUS_VILLAGES = ['東芳里', '莿桐里', '磚磘里', '南安里'];
        const normalizeMatchText = (value) => String(value || '').trim().replace(/\s+/g, '').replace(/[（）()－—–-]/g, '');
        const normalizeAddressForCompare = (value) => PRIORITY_BUS_VILLAGES.reduce((text, village) => text.split(village).join(''), normalizeMatchText(value));
        const getPriorityVillageFromAddress = (value) => PRIORITY_BUS_VILLAGES.find(village => String(value || '').includes(village)) || '';
        const createAddressState = () => ({
            areaType: 'changhua',
            county: '彰化縣',
            district: '彰化市',
            village: '',
            detail: '',
            otherAddr: ''
        });
        const normalizeAddressState = (prefix, source = {}) => ({
            areaType: source[`${prefix}AreaType`] || (source[`${prefix}Village`] ? 'changhua' : 'changhua'),
            county: source[`${prefix}County`] || '彰化縣',
            district: source[`${prefix}District`] || '彰化市',
            village: source[`${prefix}Village`] || '',
            detail: source[`${prefix}Detail`] || '',
            otherAddr: source[`${prefix}OtherAddr`] || ''
        });
        const flattenAddressState = (prefix, address) => ({
            [`${prefix}AreaType`]: address.areaType,
            [`${prefix}County`]: address.areaType === 'changhua' ? (address.county || '彰化縣') : '',
            [`${prefix}District`]: address.areaType === 'changhua' ? (address.district || '彰化市') : '',
            [`${prefix}Village`]: address.areaType === 'changhua' ? address.village : '',
            [`${prefix}Detail`]: address.areaType === 'changhua' ? address.detail : '',
            [`${prefix}OtherAddr`]: address.areaType === 'other' ? address.otherAddr : ''
        });
        const composeAddressText = (address) => {
            if (address.areaType === 'changhua') {
                return [address.county || '彰化縣', address.district || '彰化市', address.village, address.detail].filter(Boolean).join('');
            }
            return address.otherAddr || '';
        };
        const getAddressStateFromStudent = (prefix, student = {}) => {
            const structured = normalizeAddressState(prefix, student);
            if (student[`${prefix}AreaType`] || student[`${prefix}Village`] || student[`${prefix}Detail`] || student[`${prefix}OtherAddr`]) {
                return structured;
            }
            const oldAddress = student[prefix === 'residence' ? 'residenceAddr' : 'commAddr'] || '';
            return oldAddress ? { ...createAddressState(), areaType: 'other', otherAddr: oldAddress } : createAddressState();
        };
        const getAddressEligibility = (actualAddress) => {
            if (actualAddress.areaType !== 'changhua') {
                return { status: '需人工確認', village: '', isPriorityVillage: false };
            }
            const isPriorityVillage = PRIORITY_BUS_VILLAGES.includes(actualAddress.village);
            return {
                status: isPriorityVillage ? '戶籍優先里' : '戶籍非優先里',
                village: actualAddress.village,
                isPriorityVillage
            };
        };
        const getLocalDateString = (date = new Date()) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };
        const getLocalDateTimeLabel = (date = new Date()) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d}_${hh}-${mm}`;
        };
        const safeFileName = (value, fallback = '未命名') => {
            const clean = String(value || '').trim().replace(/[\\/:*?"<>|]/g, '-').replace(/\s+/g, '');
            return clean || fallback;
        };
        const downloadTextFile = (content, filename, type = 'text/plain;charset=utf-8;') => {
            const blob = new Blob([content], { type });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(link.href);
        };
        const formatDateLabel = (dateText) => dateText ? dateText.replaceAll('-', '/') : '';
        const isDateInRange = (dateText, startDate, endDate) => {
            if (!dateText) return true;
            if (startDate && dateText < startDate) return false;
            if (endDate && dateText > endDate) return false;
            return true;
        };

        const buildSurveyQuestions = (config = {}) => {
            const source = config.surveyQuestionsConfigured === true
                ? (Array.isArray(config.surveyQuestions) ? config.surveyQuestions : [])
                : Array.isArray(config.surveyQuestions)
                ? config.surveyQuestions
                : [{
                    id: 'traffic-need',
                    title: config.surveyTitle || DEFAULT_SURVEY_TITLE,
                    description: config.surveyDescription || DEFAULT_SURVEY_DESCRIPTION,
                    options: (Array.isArray(config.returnOptions) && config.returnOptions.length > 0) ? config.returnOptions : DEFAULT_RETURN_OPTIONS,
                    noteEnabled: config.surveyNoteEnabled !== false,
                    noteLabel: config.surveyNoteLabel || DEFAULT_SURVEY_NOTE_LABEL
                }];
            return source.map((q, idx) => ({
                id: q.id || `question-${idx + 1}`,
                title: q.title || `自訂題目 ${idx + 1}`,
                description: q.description || '',
                options: Array.isArray(q.options) && q.options.length > 0 ? q.options : ['是', '否'],
                noteEnabled: q.noteEnabled !== false,
                noteLabel: q.noteLabel || '備註（選填）',
                // 只有後台明確開啟的題目才會連動環線，絕不以題目文字猜測。
                loopEnabled: q.loopEnabled === true,
                loopServiceName: q.loopServiceName || '本期環線',
                loopRequiredOption: q.loopRequiredOption || ''
            }));
        };

        // 共用的顯示設定：報名、後台與座位頁使用同一份資料，避免各頁各自維護。
        const WEEKDAY_OPTIONS = [
            { val: 1, label: '週一' }, { val: 2, label: '週二' }, { val: 3, label: '週三' },
            { val: 4, label: '週四' }, { val: 5, label: '週五' }
        ];
        const SHIFT_OPTIONS = [{ key: 'morning', label: '上學' }, { key: 'afternoon', label: '放學' }];
        const AFTERNOON_LOOP_VEHICLES = [
            { id: 'afternoon-loop-a', name: '環線 A車', capacity: 43, stops: [] },
            { id: 'afternoon-loop-b', name: '環線 B車', capacity: 43, stops: [] }
        ];
        const getActiveSessionName = (masterConfig, fallback = '未命名期程') => {
            const activeSessionId = masterConfig?.activeSessionId;
            return masterConfig?.sessions?.find(session => session.id === activeSessionId)?.name || activeSessionId || fallback;
        };

        const getGenderSeatColor = (gender) => gender === '男'
            ? 'bg-blue-100 border-blue-300 text-blue-800'
            : 'bg-pink-100 border-pink-300 text-pink-800';
        const CAPTAIN_SEAT_COLOR = 'bg-amber-100 border-amber-400 text-amber-900';
        const getSeatCellStyle = (item) => ({
            gridColumn: `span ${item.colSpan || 1} / span ${item.colSpan || 1}`,
            gridRow: `span ${item.rowSpan || 1} / span ${item.rowSpan || 1}`
        });

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDYVMrTE6rfU8HrZfPHKslLBYAawFFryuw",
            authDomain: "changan-schoolbus.firebaseapp.com",
            projectId: "changan-schoolbus",
            storageBucket: "changan-schoolbus.firebasestorage.app",
            messagingSenderId: "1044840346906",
            appId: "1:1044840346906:web:a54677ee169f64747da8a3",
            measurementId: "G-ZKCCQR0G5P"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 依據安全規則指引限制，所有文件都必須儲存在 artifacts/{appId}/public/data/ 下
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'changan-schoolbus';

        const hashPassword = async (password) => {
            try {
                const msgBuffer = new TextEncoder().encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            } catch (err) { return password; }
        };

        const formatNoRide = (noRideObj) => {
            if (!noRideObj || Object.keys(noRideObj).length === 0) return '無 (全勤搭車)';
            const daysMap = { '1': '一', '2': '二', '3': '三', '4': '四', '5': '五' };
            const shiftsMap = { 'morning': '上學', 'afternoon': '放學' };
            const items = [];
            for (const [key, val] of Object.entries(noRideObj)) {
                if (val) {
                    const [d, s] = key.split('-');
                    if (daysMap[d] && shiftsMap[s]) {
                        items.push(`週${daysMap[d]}${shiftsMap[s]}`);
                    }
                }
            }
            return items.length > 0 ? items.join('、') : '無 (全勤搭車)';
        };

        const normalizeText = (value) => String(value || '').trim();
        const normalizePhone = (value) => normalizeText(value).replace(/\D/g, '');
        const normalizeBirthDate = (value) => {
            const text = String(value || '').trim();
            const match = text.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
            if (!match) return '';
            const [, year, month, day] = match;
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        };
        const getExcelCellValue = (row, headers) => {
            const header = headers.find(item => Object.prototype.hasOwnProperty.call(row, item));
            return header ? row[header] : '';
        };
        const buildLookupKey = async (parentName, parentMobile) => {
            const name = normalizeText(parentName).replace(/\s+/g, '');
            const phone = normalizePhone(parentMobile);
            if (!name || !phone) return '';
            return hashPassword(`${name}|${phone}`);
        };
        const createStudentRecordId = () => {
            if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') return crypto.randomUUID();
            return `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
        };
        const buildPlainParentKey = (parentName, parentMobile) => {
            const name = normalizeText(parentName).replace(/\s+/g, '');
            const phone = normalizePhone(parentMobile);
            return name && phone ? `${name}|${phone}` : '';
        };
        // 家長查詢只會使用這份摘要；不可放入地址、生日、電話或其他私密欄位。
        const buildParentQuerySummary = (student = {}) => ({
            id: student.id || '',
            dedupeKey: student.dedupeKey || '',
            name: student.name || '',
            gender: student.gender || '',
            class: student.class || '',
            seat: student.seat || '',
            routeId: student.routeId || '',
            stopName: student.stopName || '',
            seatNote: student.seatNote || '',
            surveyAnswers: student.surveyAnswers || {},
            surveyNotes: student.surveyNotes || {},
            returnBus: student.returnBus || '',
            returnNote: student.returnNote || '',
            noRide: student.noRide || {},
            busEligibilityStatus: student.busEligibilityStatus || '待學務資料比對',
            submittedAt: student.submittedAt || Date.now(),
            updatedAt: student.updatedAt || Date.now()
        });
        const getParentEligibilityStatus = (status) => {
            if (status === '已確認符合') return { label: '已確認符合', className: 'bg-emerald-100 text-emerald-700' };
            if (status === '不符合指定里') return { label: '不符合指定里', className: 'bg-red-100 text-red-700' };
            return { label: '資格審核中', className: 'bg-amber-100 text-amber-800' };
        };
        const getStudentTimestamp = (student = {}) => {
            const candidates = [student.updatedAt, student.submittedAt, student.createdAt, student.id];
            for (const candidate of candidates) {
                const num = Number(candidate);
                if (Number.isFinite(num) && num > 0) return num;
            }
            return 0;
        };
        const getStudentOrderValue = (student = {}) => {
            const candidates = [student.createdAt, student.id, student.submittedAt, student.updatedAt];
            for (const candidate of candidates) {
                const num = Number(candidate);
                if (Number.isFinite(num) && num > 0) return num;
            }
            return 0;
        };
        const getStudentDedupeKey = (student = {}) => {
            const cls = normalizeText(student.class);
            const seat = normalizeText(student.seat);
            const name = normalizeText(student.name);
            const lookupKey = normalizeText(student.lookupKey);
            if (name && lookupKey) return `name-lookup:${name}|${lookupKey}`;
            const parentKey = buildPlainParentKey(student.parentName, student.parentMobile);
            if (name && parentKey) return `name-parent:${name}|${parentKey}`;
            const sid = normalizeText(student.sid);
            if (sid && name) return `sid-name:${sid}|${name}`;
            if (cls && seat && name) return `class-seat-name:${cls}|${seat}|${name}`;
            const savedKey = normalizeText(student.dedupeKey);
            if (savedKey.startsWith('sid:') && name) return `sid-name:${savedKey.slice(4)}|${name}`;
            if (savedKey.startsWith('name-parent:') && name && !savedKey.includes(`:${name}|`)) return `id:${student.id}`;
            if (savedKey.startsWith('class-seat-name:') && name && lookupKey) return `name-lookup:${name}|${lookupKey}`;
            if (savedKey) return savedKey;
            return `id:${student.id}`;
        };
        const getStudentMatchKeys = (data = {}) => {
            const keys = [];
            const cls = normalizeText(data.class);
            const seat = normalizeText(data.seat);
            const name = normalizeText(data.name);
            const lookupKey = normalizeText(data.lookupKey);
            if (name && lookupKey) keys.push({ key: `name-lookup:${name}|${lookupKey}`, strict: true });
            const parentKey = buildPlainParentKey(data.parentName, data.parentMobile);
            if (name && parentKey) keys.push({ key: `name-parent:${name}|${parentKey}`, strict: true });
            const sid = normalizeText(data.sid);
            if (sid && name) keys.push({ key: `sid-name:${sid}|${name}`, strict: true });
            if (cls && seat && name) keys.push({ key: `class-seat-name:${cls}|${seat}|${name}`, strict: true });
            return keys;
        };
        const createStudentDedupeKey = (data = {}) => {
            return getStudentMatchKeys(data)[0]?.key || '';
        };
        const dedupeLatestStudents = (list = []) => {
            const byKey = new Map();
            list.forEach(student => {
                const key = getStudentDedupeKey(student);
                const current = byKey.get(key);
                if (!current || getStudentTimestamp(student) >= getStudentTimestamp(current)) {
                    byKey.set(key, student);
                }
            });
            return Array.from(byKey.values()).sort((a, b) => getStudentOrderValue(a) - getStudentOrderValue(b));
        };
        const findExistingStudentId = (list = [], formData = {}) => {
            for (const { key, strict } of getStudentMatchKeys(formData)) {
                const matches = list.filter(student => getStudentDedupeKey(student) === key);
                if (matches.length === 0) continue;
                if (!strict && matches.length > 1) return null;
                return matches.sort((a, b) => getStudentTimestamp(b) - getStudentTimestamp(a))[0].id;
            }
            return null;
        };

        const generateSeatLayout = () => {
            const layout = [];
            const addFullRow = (r) => {
                layout.push(
                    { id: `${r}-1`, label: `${r}排1號`, type: 'seat', side: 'L' },
                    { id: `${r}-2`, label: `${r}排2號`, type: 'seat', side: 'L' },
                    { id: `aisle-${r}`, type: 'empty' },
                    { id: `${r}-3`, label: `${r}排3號`, type: 'seat', side: 'R' },
                    { id: `${r}-4`, label: `${r}排4號`, type: 'seat', side: 'R' }
                );
            };

            layout.push(
                { id: 'driver', type: 'driver', label: '駕駛員', colSpan: 2 },
                { id: 'aisle-driver', type: 'empty' },
                { id: 'door-front', type: 'door', label: '前門', colSpan: 2, rowSpan: 3 },

            return (

                    <div className="max-w-7xl mx-auto px-3 sm:px-4">
                        <div className="flex flex-col md:flex-row md:justify-between md:items-center min-h-16 py-2 gap-2 md:gap-4">
                            <div className="flex items-center space-x-2 select-none cursor-pointer shrink-0" onClick={() => !ctx.isAdminLoggedIn && setShowLoginModal(true)}>
                                <i className="ph-fill ph-bus text-3xl"></i>
                                <div className="flex flex-col">
                                    <span className="font-bold text-lg sm:text-xl tracking-tight leading-tight">彰安校車管理系統</span>
                                </div>

                                <button onClick={() => setCurrentPage('register')} className={`shrink-0 px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition flex items-center gap-2 ${currentPage === 'register' ? 'bg-indigo-700' : ''}`}>
                                    <span>學生報名</span>

                                <button onClick={() => setCurrentPage('lookup')} className={`shrink-0 px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition ${currentPage === 'lookup' ? 'bg-indigo-700' : ''}`}>查詢報名</button>
                                <button onClick={() => setCurrentPage('leave')} className={`shrink-0 px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition ${currentPage === 'leave' ? 'bg-indigo-700' : ''}`}>請假申請</button>
                                <button onClick={() => setCurrentPage('rollcall')} className={`shrink-0 px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition ${currentPage === 'rollcall' ? 'bg-indigo-700' : ''}`}>車長點名</button>
                                {ctx.isAdminLoggedIn && (

                                        <button onClick={() => setCurrentPage('admin')} className={`shrink-0 px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition ${currentPage === 'admin' ? 'bg-indigo-700' : ''}`}>後台管理</button>
                                        <button onClick={async () => { await ctx.signOutAdmin(); setCurrentPage('register'); }} className="shrink-0 md:ml-2 px-3 py-2 rounded-md text-sm font-bold bg-red-500 hover:bg-red-600 transition shadow-sm"><i className="ph-bold ph-sign-out mr-1"></i>登出</button>

        const LoginModal = ({ ctx, showLoginModal, setShowLoginModal, setCurrentPage }) => {
            const [account, setAccount] = useState('');
            const [busy, setBusy] = useState(false);
            if (!showLoginModal) return null;
            const handleLogin = async (e) => {
                e.preventDefault();
                const email = normalizeSchoolAdminEmail(account);
                if (!isSchoolAdminEmail(email)) return ctx.showMessage(`請輸入 ${SCHOOL_ADMIN_DOMAIN} 的學校公務帳號`, 'error');
                setBusy(true);
                try {
                    await ctx.signInSchoolAdmin(email);
                    setShowLoginModal(false);
                    setCurrentPage('admin');
                } catch (err) {
                    ctx.showMessage(err.message || '學校 Google 帳號登入失敗', 'error');
                } finally {
                    setBusy(false);
                }
            };
            return (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden p-6">
                        <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-lg">學校帳號登入</h3><button onClick={() => setShowLoginModal(false)}><i className="ph-bold ph-x text-xl"></i></button></div>
                        <form onSubmit={handleLogin} className="space-y-4">

            const isChanghua = value.areaType !== 'other';
            const regions = normalizeAddressRegions(addressRegions);
            const counties = [...new Set(regions.map(region => region.county))];
            const districts = regions.filter(region => region.county === (value.county || counties[0])).map(region => region.district);
            const selectedRegion = regions.find(region => region.county === (value.county || counties[0]) && region.district === (value.district || districts[0]));
            return (
                <div className="sm:col-span-2 rounded-lg border border-gray-100 bg-gray-50 p-3 space-y-3">
                    <div className="flex flex-wrap items-center justify-between gap-2">

                        {onSameAsResidenceChange && (
                            <label className="inline-flex items-center gap-2 text-xs font-bold text-indigo-700">
                                <input type="checkbox" checked={sameAsResidence} onChange={e => onSameAsResidenceChange(e.target.checked)} className="h-4 w-4 accent-indigo-600" />
                                同戶籍地址
                            </label>
                        )}
                    </div>
                    {!sameAsResidence && (
                        <>

                                <select value={value.areaType || 'changhua'} onChange={e => onChange({ ...createAddressState(), areaType: e.target.value })} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white">
                                    <option value="changhua">國內地址</option>
                                    <option value="other">其他縣市／鄉鎮</option>
                                </select>
                                {isChanghua && (
                                    <>
                                        <select value={value.county || counties[0] || ''} onChange={e => { const county = e.target.value; const firstDistrict = regions.find(region => region.county === county)?.district || ''; onChange({ ...value, county, district: firstDistrict, village: '' }); }} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white">
                                            {counties.map(county => <option key={county} value={county}>{county}</option>)}
                                        </select>
                                        <select value={value.district || districts[0] || ''} onChange={e => onChange({ ...value, district: e.target.value, village: '' })} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white">
                                            {districts.map(district => <option key={district} value={district}>{district}</option>)}
                                        </select>
                                        {selectedRegion?.villages?.length > 0 ? (
                                            <select required={required} value={value.village || ''} onChange={e => onChange({ ...value, village: e.target.value })} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white sm:col-span-2">
                                                <option value="">請選擇里／村</option>
                                                {selectedRegion.villages.map(village => <option key={village} value={village}>{village}</option>)}
                                            </select>
                                        ) : (
                                            <input required={required} type="text" placeholder="請輸入里／村" value={value.village || ''} onChange={e => onChange({ ...value, village: e.target.value })} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white sm:col-span-2" />
                                        )}
                                    </>
                                )}
                            </div>
                            {isChanghua ? (
                                <>
                                    {SCHOOL_DISTRICT_VILLAGE_NOTES[value.village] && <p className="rounded-lg bg-amber-50 px-3 py-2 text-xs font-bold leading-5 text-amber-700">{SCHOOL_DISTRICT_VILLAGE_NOTES[value.village]}</p>}
                                    <input required={required} type="text" placeholder="請填鄰、路、街、巷、弄、號、樓等詳細地址" value={value.detail || ''} onChange={e => onChange({ ...value, detail: e.target.value })} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white" />
                                </>
                            ) : (
                                <input required={required} type="text" placeholder="請填寫完整地址" value={value.otherAddr || ''} onChange={e => onChange({ ...value, otherAddr: e.target.value })} className="w-full px-3 py-2 border rounded-lg focus:ring-2 outline-none bg-white" />
                            )}
                        </>
                    )}
                </div>
            );
        };

        const RegisterPage = ({ ctx }) => {
            const [formData, setFormData] = useState({
                sid: '', class: '', seat: '', name: '', gender: '男', birthDate: '', homePhone: '', mobile: '', parentName: '', parentMobile: '',
                residenceAddr: '', commAddr: '', residenceAddress: createAddressState(), commSameAsResidence: true, commAddress: createAddressState(),
                routeId: '', stopName: '', seatNote: '', returnBus: '', returnNote: '',
                surveyAnswers: {}, surveyNotes: {},
                noRide: {}
            });
            const [submittedOk, setSubmittedOk] = useState(false);
            const createEmptyRegisterForm = () => ({
                sid: '', class: '', seat: '', name: '', gender: '男', birthDate: '', homePhone: '', mobile: '', parentName: '', parentMobile: '',
                residenceAddr: '', commAddr: '', residenceAddress: createAddressState(), commSameAsResidence: true, commAddress: createAddressState(),
                routeId: ctx.activeRoutes[0]?.id || '', stopName: ctx.activeRoutes[0]?.stops[0] || '', seatNote: '', returnBus: '', returnNote: '',
                surveyAnswers: {}, surveyNotes: {}, noRide: {}
            });

            useEffect(() => {
                if (!formData.routeId && ctx.activeRoutes.length > 0) {
                    setFormData(prev => ({ ...prev, routeId: ctx.activeRoutes[0].id, stopName: ctx.activeRoutes[0].stops[0] }));
                }
            }, [ctx.activeRoutes]);

            const days = [{val: 1, label: '週一'}, {val: 2, label: '週二'}, {val: 3, label: '週三'}, {val: 4, label: '週四'}, {val: 5, label: '週五'}];
            const selectedRoute = ctx.activeRoutes.find(r => r.id === formData.routeId);
            const registrationNotice = (!ctx.appConfig.registrationNotice || ctx.appConfig.registrationNotice === LEGACY_REGISTRATION_NOTICE) ? DEFAULT_REGISTRATION_NOTICE : ctx.appConfig.registrationNotice;
            const surveyQuestions = buildSurveyQuestions(ctx.appConfig);
            const registrationDeadline = ctx.appConfig.registrationDeadline || '';
            const hasRegistrationDeadline = !!registrationDeadline;
            const deadlineTime = hasRegistrationDeadline ? new Date(registrationDeadline).getTime() : NaN;
            const isPastRegistrationDeadline = hasRegistrationDeadline && !Number.isNaN(deadlineTime) && Date.now() >= deadlineTime;
            const isRegistrationClosed = ctx.appConfig.registrationClosed === true || isPastRegistrationDeadline;
            const registrationClosedText = ctx.appConfig.registrationClosed === true
                ? '目前報名表已暫停開放。'
                : hasRegistrationDeadline
                ? `本期報名已於 ${registrationDeadline.replace('T', ' ')} 截止。`
                : '目前報名表已暫停開放。';

            const toggleNoRide = (day, shift) => {
                const key = `${day}-${shift}`;
                setFormData(prev => ({ ...prev, noRide: { ...prev.noRide, [key]: !prev.noRide[key] } }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!ctx.user) return;
                if (isRegistrationClosed) {
                    return ctx.showMessage('目前報名表已關閉，無法送出資料', 'error');
                }
                const normalizedClass = String(formData.class || '').trim();
                if (!(normalizedClass === '新生' || /^[789]\d{2}$/.test(normalizedClass))) {
                    return ctx.showMessage('班級請填 701、808、911 這類三碼格式；尚未編班的七年級請填「新生」', 'error');
                }

                const lookupKey = await buildLookupKey(formData.parentName, formData.parentMobile);
                const identityData = { ...formData, lookupKey };
                const parentQuery = lookupKey ? await ctx.findParentQueryByLookupKey(lookupKey) : null;
                const existingPool = Object.values(parentQuery?.students || {});
                const existingId = findExistingStudentId(existingPool, identityData);
                const existingStudent = existingId ? existingPool.find(s => s.id === existingId) : null;
                // 家長端不再讀取全校報名資料計算名額，避免把學生名單暴露給匿名使用者。
                const liveRouteCount = selectedRoute?.capacity && ctx.canSeeRoster ? (ctx.routeCounts[selectedRoute.id] || 0) : 0;
                if (!existingId && selectedRoute && selectedRoute.capacity && liveRouteCount >= selectedRoute.capacity) {
                    return ctx.showMessage('非常抱歉，該路線名額已滿！', 'error');
                }

                const now = Date.now();
                const targetId = existingId || createStudentRecordId();
                const dedupeKey = createStudentDedupeKey(identityData);
                const surveyAnswers = {};
                const surveyNotes = {};
                surveyQuestions.forEach(q => {
                    surveyAnswers[q.id] = formData.surveyAnswers[q.id] || q.options[0] || '';
                    if (q.noteEnabled) surveyNotes[q.id] = formData.surveyNotes[q.id] || '';
                });
                const firstQuestion = surveyQuestions[0];
                const originalCreatedAt = existingStudent?.createdAt || Number(existingStudent?.id) || now;
                const publicData = {
                    id: targetId,
                    ownerUid: ctx.user.uid,
                    dedupeKey,
                    class: formData.class,
                    seat: formData.seat,
                    name: formData.name,
                    gender: formData.gender,
                    routeId: formData.routeId,
                    stopName: formData.stopName,
                    seatNote: formData.seatNote,
                    surveyAnswers,
                    surveyNotes,
                    returnBus: firstQuestion ? surveyAnswers[firstQuestion.id] : '',
                    returnNote: firstQuestion ? (surveyNotes[firstQuestion.id] || '') : '',
                    noRide: formData.noRide,
                    lookupKey,
                    // 同一位學生補填或重填時，保留已完成的資格判定；新報名才進入審核中。
                    busEligibilityStatus: existingStudent?.busEligibilityStatus || '待學務資料比對',
                    isPriorityBusVillage: false,
                    createdAt: originalCreatedAt,
                    submittedAt: now,
                    updatedAt: now
                };
                const privateData = {
                    id: targetId,
                    ownerUid: ctx.user.uid,
                    dedupeKey,
                    sid: formData.sid,
                    birthDate: normalizeBirthDate(formData.birthDate),
                    homePhone: formData.homePhone,
                    mobile: formData.mobile,
                    parentName: formData.parentName,
                    parentMobile: formData.parentMobile,
                    updatedAt: now
                };
                try {
                    await setDoc(ctx.getDocRef('students_public', targetId), publicData, { merge: true });
                    await setDoc(ctx.getDocRef('students_private', targetId), privateData, { merge: true });
                    await ctx.upsertParentQuerySummary(lookupKey, buildParentQuerySummary(publicData));
                    ctx.showMessage(existingId ? '已更新原本的報名資料' : '報名成功！資料已送出');
                    setSubmittedOk(true);
                    setFormData(createEmptyRegisterForm());
                } catch(err) { ctx.showMessage('連線錯誤', 'error'); }
            };

            const currentRouteCount = ctx.canSeeRoster ? (ctx.routeCounts[formData.routeId] || 0) : null;
            const isSelectedRouteFull = selectedRoute && selectedRoute.capacity && currentRouteCount !== null && currentRouteCount >= selectedRoute.capacity;
            const activeSessionName = getActiveSessionName(ctx.masterConfig, '載入中...');

            if (submittedOk) {
                return (
                    <div className="max-w-2xl mx-auto p-3 sm:p-4 transition-all duration-500">
