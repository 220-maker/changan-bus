                                                                            <button type="button" onClick={() => toggleEditNoRide(day.val, shift.key)} className={`inline-flex h-10 w-10 items-center justify-center rounded-lg border-2 transition ${checked ? 'border-red-400 bg-red-100 text-red-600' : 'border-gray-200 bg-white text-gray-300 hover:border-gray-300'}`} title={`${day.label}${shift.label}${checked ? '固定不搭' : '搭車'}`}>
                                                                                <i className={`ph-bold ${checked ? 'ph-check' : 'ph-minus'} text-lg`}></i>
                                                                            </button>
                                                                        </td>
                                                                    );
                                                                })}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        <div className="rounded-xl border border-gray-200 bg-gray-50 p-4 space-y-3">
                                            <h4 className="flex items-center text-sm font-bold text-gray-800"><i className="ph-fill ph-map-pin mr-2 text-lg text-indigo-600"></i>地址資料</h4>
                                            <AddressFields
                                                title="戶籍地址"
                                                value={editFormData.residenceAddress || createAddressState()}
                                                required={true}
                                                addressRegions={ctx.appConfig.addressRegions}
                                                onChange={residenceAddress => setEditFormData({...editFormData, residenceAddress})}
                                            />
                                            <AddressFields
                                                title="通訊／實際居住地址"
                                                value={editFormData.commAddress || createAddressState()}
                                                sameAsResidence={editFormData.commSameAsResidence === true}
                                                addressRegions={ctx.appConfig.addressRegions}
                                                onSameAsResidenceChange={commSameAsResidence => setEditFormData({...editFormData, commSameAsResidence})}
                                                required={editFormData.commSameAsResidence !== true}
                                                onChange={commAddress => setEditFormData({...editFormData, commAddress})}
                                            />
                                        </div>
                                    </form>
                                </div>
                                <div className="p-4 border-t bg-gray-50 flex justify-end shrink-0">
                                    <button onClick={() => setEditModalOpen(false)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg mr-2 font-bold hover:bg-gray-300">取消</button>
                                    <button type="submit" form="edit-student-form" className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 shadow-md">儲存變更</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SeatingPage = ({ ctx }) => {
            const [routeId, setRouteId] = useState('');
            const [studentPoolRouteId, setStudentPoolRouteId] = useState('all');
            const [selectedSeat, setSelectedSeat] = useState(null);
            const [activeColor, setActiveColor] = useState(null);
            const [privacyMode, setPrivacyMode] = useState(false);

            const seatingVehicles = [...ctx.activeRoutes, ...AFTERNOON_LOOP_VEHICLES];
            const isAfternoonVehicle = routeId === 'afternoon-loop-a' || routeId === 'afternoon-loop-b';
            const afternoonVehicleName = routeId === 'afternoon-loop-a' ? '環線 A車' : routeId === 'afternoon-loop-b' ? '環線 B車' : '';
            const seatingKey = routeId;

            useEffect(() => {
                if (!routeId && seatingVehicles.length > 0) setRouteId(seatingVehicles[0].id);
            }, [ctx.activeRoutes, routeId]);

            if (!ctx.isAdminLoggedIn) return null;

            const currentSeating = ctx.seatingArrangements[seatingKey]?.seats || {};
            const afternoonStudentIds = new Set((ctx.afternoonLoopAssignments || [])
                .filter(record => record.scheduleType === 'fixed' && record.vehicle === afternoonVehicleName && record.included !== false)
                .map(record => record.studentId));
            const routeStudents = isAfternoonVehicle
                ? ctx.students.filter(s => afternoonStudentIds.has(s.id))
                : ctx.students.filter(s => s.routeId === routeId);
            const assignedStudentIds = isAfternoonVehicle
                ? Object.values(currentSeating).map(s => s.studentId)
                : Object.entries(ctx.seatingArrangements || {})
                    .filter(([id]) => !id.startsWith('afternoon-loop-'))
                    .flatMap(([, arr]) => Object.values(arr?.seats || {}).map(s => s.studentId));
            const assignedStudentIdSet = new Set(assignedStudentIds);
            const currentRoute = seatingVehicles.find(r => r.id === routeId);
            const currentSessionName = getActiveSessionName(ctx.masterConfig, '目前期程');
            const stopOrder = currentRoute?.stops || [];
            const getRouteName = (id) => seatingVehicles.find(r => r.id === id)?.name || ctx.routes.find(r => r.id === id)?.name || '未設定路線';
            const isCrossRouteStudent = (student) => !isAfternoonVehicle && student && student.routeId && student.routeId !== routeId;
            const maskStudentName = (name) => {
                const clean = String(name || '').trim();
                if (!clean) return '';
                if (clean.length === 1) return '○';
                if (clean.length === 2) return `${clean[0]}○`;
                return `${clean[0]}○${clean.slice(-1)}`;
            };
            const displayStudentName = (student) => privacyMode ? maskStudentName(student?.name) : (student?.name || '');
            const sortStudentsForSeating = (list) => [...list].sort((a, b) => {
                const stopDiff = (stopOrder.indexOf(a.stopName) === -1 ? 999 : stopOrder.indexOf(a.stopName)) - (stopOrder.indexOf(b.stopName) === -1 ? 999 : stopOrder.indexOf(b.stopName));
                if (stopDiff !== 0) return stopDiff;
                const classDiff = String(a.class || '').localeCompare(String(b.class || ''), 'zh-Hant');
                if (classDiff !== 0) return classDiff;
                return (parseInt(a.seat) || 999) - (parseInt(b.seat) || 999);
            });
            const studentPoolRoutes = isAfternoonVehicle
                ? [{ id: 'current', name: '本環線未排' }]
                : [{ id: 'all', name: '全部路線未排（跨線用）' }, { id: 'current', name: '本車路線未排' }, ...ctx.activeRoutes.map(r => ({ id: r.id, name: `${r.name}未排` }))];
            const getPoolStudents = () => {
                const base = isAfternoonVehicle
                    ? routeStudents
                    : studentPoolRouteId === 'all'
                    ? ctx.students
                    : ctx.students.filter(s => s.routeId === (studentPoolRouteId === 'current' ? routeId : studentPoolRouteId));
                return base.filter(s => !assignedStudentIdSet.has(s.id));
            };
            const unassignedStudents = sortStudentsForSeating(getPoolStudents());
            const normalizeSeatNote = (student) => String(student?.seatNote || '').replace(/\s+/g, '');
            const hasFrontSeatNeed = (student) => /暈車|晕车|容易暈|容易晕|會暈|会晕|前排|坐前|前面|車頭|车头/.test(normalizeSeatNote(student));
            const hasSiblingSeatNeed = (student) => /兄弟|姊妹|姐妹|兄妹|姐弟|姊弟|手足|坐一起|一起坐|坐附近|坐旁邊|坐旁边/.test(normalizeSeatNote(student));
            const getSeatRow = (seatId) => parseInt(String(seatId).split('-')[0], 10) || 999;
            const getPreferredSide = (student) => student?.gender === '女' ? 'R' : 'L';
            const getSiblingGroupSide = (students) => {
                const notes = students.map(normalizeSeatNote).join('，');
                if (/姐弟|姊弟/.test(notes)) return 'R';
                if (/兄妹/.test(notes)) return 'L';
                const genders = new Set(students.map(s => s.gender));
                if (genders.size === 1) return genders.has('女') ? 'R' : 'L';
                return students.some(s => s.gender === '男') ? 'L' : 'R';
            };
            const seatPayload = (student, existing = {}) => ({
                studentId: student.id,
                originalRouteId: student.routeId || '',
                originalStopName: student.stopName || '',
                assignedVehicleRouteId: seatingKey,
                assignedStopName: isAfternoonVehicle
                    ? ((ctx.afternoonLoopAssignments || []).find(record => record.scheduleType === 'fixed' && record.studentId === student.id && record.vehicle === afternoonVehicleName)?.stopName || student.stopName || '')
                    : (student.stopName || ''),
                color: existing.color || getGenderSeatColor(student.gender),
                locked: existing.locked || false
            });

            const handleAutoAssign = () => {
                if (!routeId) return;
                ctx.showConfirm(`自動排座會保留目前已安排座位，只排還沒入座的${isAfternoonVehicle ? '本環線學生' : '本路線學生'}。確定繼續？`, async () => {
                    const reservedSeats = {};
                    Object.entries(currentSeating).forEach(([seatId, data]) => {
                        reservedSeats[seatId] = data;
                    });
                    const reservedStudentIds = new Set(Object.values(reservedSeats).map(s => s.studentId));
                    const remainingStudents = sortStudentsForSeating(routeStudents.filter(s => !assignedStudentIdSet.has(s.id) && !reservedStudentIds.has(s.id)));
                    const newSeats = { ...reservedSeats };
                    const seatItems = SHARED_SEAT_LAYOUT.filter(s => s.type === 'seat');
                    const seatOrder = (a, b) => seatItems.findIndex(s => s.id === a) - seatItems.findIndex(s => s.id === b);
                    const availableSeatIds = ({ side, frontOnly = false } = {}) => seatItems
                        .filter(s => !newSeats[s.id])
                        .filter(s => !side || s.side === side)
                        .filter(s => !frontOnly || getSeatRow(s.id) <= 3)
                        .map(s => s.id);
                    const findSeatBlock = (count, side, frontOnly = false) => {
                        for (let row = 1; row <= 11; row++) {
                            if (frontOnly && row > 3) break;
                            const rowSeats = seatItems
                                .filter(s => getSeatRow(s.id) === row && s.side === side && !newSeats[s.id])
                                .map(s => s.id)
                                .sort(seatOrder);
                            if (rowSeats.length >= count) return rowSeats.slice(0, count);
                        }
                        return [];
                    };
                    const chooseSeats = (count, preferredSide, options = {}) => {
                        const frontOnly = options.frontOnly === true;
                        const preferredBlock = findSeatBlock(count, preferredSide, frontOnly);
                        if (preferredBlock.length === count) return preferredBlock;
                        const preferredSeats = availableSeatIds({ side: preferredSide, frontOnly });
                        if (preferredSeats.length >= count) return preferredSeats.slice(0, count);
                        const frontSeats = frontOnly ? availableSeatIds({ frontOnly: true }) : [];
                        if (frontSeats.length >= count) return frontSeats.slice(0, count);
                        const normalBlock = findSeatBlock(count, preferredSide, false);
                        if (normalBlock.length === count) return normalBlock;
                        const normalPreferred = availableSeatIds({ side: preferredSide });
                        if (normalPreferred.length >= count) return normalPreferred.slice(0, count);
                        const otherSide = preferredSide === 'L' ? 'R' : 'L';
                        const otherBlock = findSeatBlock(count, otherSide, false);
                        if (otherBlock.length === count) return otherBlock;
                        const anySeats = availableSeatIds();
                        return anySeats.slice(0, count);
                    };
                    const placeStudents = (studentsToPlace, preferredSide, options = {}) => {
                        const seats = chooseSeats(studentsToPlace.length, preferredSide, options);
                        const placed = [];
                        studentsToPlace.forEach((student, idx) => {
                            const seatId = seats[idx];
                            if (seatId) {
                                newSeats[seatId] = seatPayload(student);
                                placed.push(student);
                            }
                        });
                        return placed;
                    };

                    const usedSpecialIds = new Set();
                    const groupedCandidateIds = new Set();
                    const siblingGroups = [];
                    remainingStudents.forEach(student => {
                        if (groupedCandidateIds.has(student.id) || !hasSiblingSeatNeed(student)) return;
                        const key = buildPlainParentKey(student.parentName, student.parentMobile);
                        const members = key
                            ? remainingStudents.filter(s => !groupedCandidateIds.has(s.id) && buildPlainParentKey(s.parentName, s.parentMobile) === key)
                            : [student];
                        if (members.length < 2) return;
                        const sortedMembers = sortStudentsForSeating(members);
                        sortedMembers.forEach(s => groupedCandidateIds.add(s.id));
                        siblingGroups.push({
                            students: sortedMembers,
                            side: getSiblingGroupSide(sortedMembers),
                            frontNeed: sortedMembers.some(hasFrontSeatNeed)
                        });
                    });

                    let frontNeedCount = 0;
                    let siblingGroupCount = 0;
                    siblingGroups.filter(g => g.frontNeed).forEach(group => {
                        const placed = placeStudents(group.students, group.side, { frontOnly: true });
                        placed.forEach(s => usedSpecialIds.add(s.id));
                        frontNeedCount += placed.length;
                        if (placed.length > 0) siblingGroupCount += 1;
                    });

                    remainingStudents
                        .filter(s => !usedSpecialIds.has(s.id) && hasFrontSeatNeed(s))
                        .forEach(student => {
                            const placed = placeStudents([student], getPreferredSide(student), { frontOnly: true });
                            placed.forEach(s => usedSpecialIds.add(s.id));
                            frontNeedCount += placed.length;
                        });

                    siblingGroups.filter(g => !g.frontNeed).forEach(group => {
                        const placed = placeStudents(group.students, group.side);
                        placed.forEach(s => usedSpecialIds.add(s.id));
                        if (placed.length > 0) siblingGroupCount += 1;
                    });

                    const normalStudents = remainingStudents.filter(s => !usedSpecialIds.has(s.id));
                    let boys = normalStudents.filter(s => s.gender === '男');
                    let girls = normalStudents.filter(s => s.gender === '女');
                    availableSeatIds({ side: 'L' }).forEach(id => { if (boys.length) newSeats[id] = seatPayload(boys.shift()); });
                    availableSeatIds({ side: 'R' }).forEach(id => { if (girls.length) newSeats[id] = seatPayload(girls.shift()); });
                    const overflowRight = availableSeatIds({ side: 'R' }).reverse();
                    const overflowLeft = availableSeatIds({ side: 'L' }).reverse();
                    boys.forEach(b => { if (overflowRight.length) newSeats[overflowRight.shift()] = seatPayload(b); else { const mid = availableSeatIds({ side: 'M' })[0]; if (mid) newSeats[mid] = seatPayload(b); } });
                    girls.forEach(g => { if (overflowLeft.length) newSeats[overflowLeft.shift()] = seatPayload(g); else { const mid = availableSeatIds({ side: 'M' })[0]; if (mid) newSeats[mid] = seatPayload(g); } });
                    await setDoc(ctx.getDocRef('seatingArrangements', seatingKey), { seats: newSeats });
                    const seatedCount = Object.keys(newSeats).length;
                    ctx.showMessage(`自動排座完成，已保留 ${Object.keys(reservedSeats).length} 個既有座位，前排需求 ${frontNeedCount} 位，手足群組 ${siblingGroupCount} 組`);
                });
            };

            const handleClearRouteSeating = () => {
                if (!routeId) return;
                const seatCount = Object.keys(currentSeating).length;
                if (seatCount === 0) {
                    ctx.showMessage('目前這條路線沒有已安排座位');
                    return;
                }
                const routeName = currentRoute?.name || '目前路線';
                ctx.showConfirm(`確定要清空「${routeName}」的全部座位嗎？這只會撤除座位安排，不會刪除學生報名資料。`, async () => {
                    await setDoc(ctx.getDocRef('seatingArrangements', seatingKey), { seats: {} });
                    setSelectedSeat(null);
                    ctx.showMessage(`已清空「${routeName}」的 ${seatCount} 個座位安排`);
                });
            };

            const handleDrop = async (e, targetSeatId) => {
                e.preventDefault();
                const sourceSeatId = e.dataTransfer.getData('seatId');
                const sourceStudentId = e.dataTransfer.getData('studentId');
                const ns = { ...currentSeating };

                if (sourceStudentId) {
                    const s = ctx.students.find(st => st.id === sourceStudentId);
                    if (!s) return;
                    Object.keys(ns).forEach(k => { if (ns[k].studentId === s.id) delete ns[k]; });
                    ns[targetSeatId] = seatPayload(s);
                    const writes = [setDoc(ctx.getDocRef('seatingArrangements', seatingKey), { seats: ns })];
                    Object.entries(ctx.seatingArrangements || {}).forEach(([otherRouteId, arrangement]) => {
                        if (otherRouteId === seatingKey) return;
                        if (isAfternoonVehicle ? !otherRouteId.startsWith('afternoon-loop-') : otherRouteId.startsWith('afternoon-loop-')) return;
                        const otherSeats = { ...(arrangement?.seats || {}) };
                        let changed = false;
                        Object.keys(otherSeats).forEach(k => {
                            if (otherSeats[k].studentId === s.id) {
                                delete otherSeats[k];
                                changed = true;
                            }
                        });
                        if (changed) writes.push(setDoc(ctx.getDocRef('seatingArrangements', otherRouteId), { seats: otherSeats }));
                    });
                    await Promise.all(writes);
                } else if (sourceSeatId) {
                    if (sourceSeatId === targetSeatId) return;
                    const temp = ns[sourceSeatId];
                    if (ns[targetSeatId]) { ns[sourceSeatId] = ns[targetSeatId]; } else { delete ns[sourceSeatId]; }
                    if (temp) ns[targetSeatId] = temp;
                    await setDoc(ctx.getDocRef('seatingArrangements', seatingKey), { seats: ns });
                }
            };

            const handleSeatClick = async (item) => {
                if (item.type !== 'seat') return;
                const seatId = item.id;
                if (activeColor && currentSeating[seatId]) {
                    const ns = { ...currentSeating };
                    const student = ctx.students.find(st => st.id === ns[seatId].studentId);
                    const fallbackColor = student ? getGenderSeatColor(student.gender) : 'bg-gray-100';
                    ns[seatId] = { ...ns[seatId], color: ns[seatId].color === activeColor ? fallbackColor : activeColor };
                    await setDoc(ctx.getDocRef('seatingArrangements', seatingKey), { seats: ns }); return;
                }
                if (!selectedSeat) { if (currentSeating[seatId]) setSelectedSeat(seatId); }
                else {
                    if (selectedSeat === seatId) { setSelectedSeat(null); return; }
                    const ns = { ...currentSeating }, tmp = ns[selectedSeat];
                    if (ns[seatId]) ns[selectedSeat] = ns[seatId]; else delete ns[selectedSeat];
                    if (tmp) ns[seatId] = tmp;
                    await setDoc(ctx.getDocRef('seatingArrangements', seatingKey), { seats: ns }); setSelectedSeat(null);
                }
            };

            const removeSeat = async (id, e) => { e.stopPropagation(); const ns = { ...currentSeating }; delete ns[id]; await setDoc(ctx.getDocRef('seatingArrangements', seatingKey), { seats: ns }); };
            const toggleSeatLock = async (id, e) => {
                e.stopPropagation();
                const ns = { ...currentSeating };
                if (!ns[id]) return;
                ns[id] = { ...ns[id], locked: !ns[id].locked };
                await setDoc(ctx.getDocRef('seatingArrangements', seatingKey), { seats: ns });
            };
            const buildSeatExportFileName = (ext) => `${safeFileName(currentRoute?.name || '座位表')}_座位表.${ext}`;
            const escapeExportText = (value) => String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
            const getSeatExportColor = (student, seatData = {}) => {
                const color = seatData.color || '';
                if (color.includes('amber')) return { fill: '#fef3c7', stroke: '#f59e0b', text: '#78350f' };
                if (color.includes('red')) return { fill: '#fee2e2', stroke: '#f87171', text: '#7f1d1d' };
                if (color.includes('green')) return { fill: '#dcfce7', stroke: '#86efac', text: '#14532d' };
                if (color.includes('gray')) return { fill: '#e5e7eb', stroke: '#9ca3af', text: '#374151' };
                if (student?.gender === '女') return { fill: '#fce7f3', stroke: '#f9a8d4', text: '#831843' };
                return { fill: '#dbeafe', stroke: '#93c5fd', text: '#1e3a8a' };
            };
            const getSeatExportPlacements = () => {
                const columns = 5;
                const occupied = new Set();
                const placements = [];
                const isFree = (row, col, colSpan, rowSpan) => {
                    if (col + colSpan - 1 > columns) return false;
                    for (let r = row; r < row + rowSpan; r++) {
                        for (let c = col; c < col + colSpan; c++) {
                            if (occupied.has(`${r}-${c}`)) return false;
                        }
                    }
                    return true;
                };
                const occupy = (row, col, colSpan, rowSpan) => {
                    for (let r = row; r < row + rowSpan; r++) {
                        for (let c = col; c < col + colSpan; c++) occupied.add(`${r}-${c}`);
                    }
                };
                let row = 1;
                let col = 1;
                SHARED_SEAT_LAYOUT.forEach((item) => {
                    const colSpan = item.colSpan || 1;
                    const rowSpan = item.rowSpan || 1;
                    while (!isFree(row, col, colSpan, rowSpan)) {
                        col += 1;
                        if (col > columns) { row += 1; col = 1; }
                    }
                    placements.push({ item, row, col, colSpan, rowSpan });
                    occupy(row, col, colSpan, rowSpan);
                    col += colSpan;
                    if (col > columns) { row += 1; col = 1; }
                });
                return placements;
            };
            const getShortSeatLabel = (seatId, fallback = '') => {
                const text = String(seatId || fallback || '');
                if (text.endsWith('-m')) return text.replace('-m', '中');
                return text.replace(/^(\d+)-(\d+)$/, '$1-$2');
            };
            const buildSeatExportSvg = () => {
                const cellW = 96, cellH = 70, gapX = 10, gapY = 12;
                const pad = 28, headerH = 66;
                const placements = getSeatExportPlacements();
                const maxRow = Math.max(...placements.map(p => p.row + p.rowSpan - 1));
                const gridW = 5 * cellW + 4 * gapX;
                const gridH = maxRow * cellH + (maxRow - 1) * gapY;
                const width = gridW + pad * 2;
                const height = headerH + gridH + pad;
                const seatMarkup = placements.map(({ item, row, col, colSpan, rowSpan }) => {
                    const x = pad + (col - 1) * (cellW + gapX);
                    const y = headerH + (row - 1) * (cellH + gapY);
                    const w = colSpan * cellW + (colSpan - 1) * gapX;
                    const h = rowSpan * cellH + (rowSpan - 1) * gapY;
                    if (item.type === 'empty') return '';
                    if (item.type !== 'seat') {
                        return `<g><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/><text x="${x + w / 2}" y="${y + h / 2 + 5}" text-anchor="middle" font-size="15" font-weight="700" fill="#4b5563">${escapeExportText(item.label)}</text></g>`;
                    }
                    const sd = currentSeating[item.id];
                    const student = sd ? ctx.students.find(st => st.id === sd.studentId) : null;
                    const colors = getSeatExportColor(student, sd);
                    const isCross = isCrossRouteStudent(student);
                    const name = student ? displayStudentName(student) : item.label;
                    const stop = student ? (sd?.assignedStopName || student.stopName || '') : '';
                    const route = student && isCross ? getRouteName(student.routeId) : '';
                    const note = student?.seatNote ? '備註' : '';
                    const seatNo = getShortSeatLabel(item.id, item.label);
                    return `<g>
                        <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${student ? colors.fill : '#ffffff'}" stroke="${student ? colors.stroke : '#d1d5db'}" stroke-width="2" stroke-dasharray="${student ? '0' : '5 4'}"/>
                        ${isCross ? `<rect x="${x + 22}" y="${y - 8}" width="${w - 44}" height="18" rx="9" fill="#f97316"/><text x="${x + w / 2}" y="${y + 5}" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">跨線</text>` : ''}
                        <text x="${x + 7}" y="${y + 14}" font-size="10" font-weight="800" fill="#374151">${escapeExportText(seatNo)}</text>
                        ${sd?.locked ? `<text x="${x + 7}" y="${y + 29}" font-size="12" fill="#374151">鎖</text>` : ''}
                        ${sd?.color === CAPTAIN_SEAT_COLOR ? `<text x="${x + w - 18}" y="${y + 15}" font-size="12" fill="#b45309">★</text>` : ''}
                        <text x="${x + w / 2}" y="${y + 25}" text-anchor="middle" font-size="13" font-weight="800" fill="${student ? colors.text : '#9ca3af'}">${escapeExportText(name)}</text>
                        <text x="${x + w / 2}" y="${y + 42}" text-anchor="middle" font-size="10" fill="${student ? colors.text : '#9ca3af'}">${escapeExportText(stop)}</text>
                        ${route ? `<text x="${x + w / 2}" y="${y + 56}" text-anchor="middle" font-size="9" font-weight="700" fill="#c2410c">${escapeExportText(route)}</text>` : ''}
                        ${note ? `<text x="${x + w / 2}" y="${y + h - 6}" text-anchor="middle" font-size="9" font-weight="700" fill="#374151">${note}</text>` : ''}
                    </g>`;
                }).join('');
                return `<?xml version="1.0" encoding="UTF-8"?>
                <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
                    <style>
                        text { font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Heiti TC", Arial, sans-serif; }
                    </style>
                    <rect width="100%" height="100%" fill="#ffffff"/>
                    <text x="${width / 2}" y="42" text-anchor="middle" font-size="28" font-weight="800" fill="#111827">${escapeExportText(currentRoute?.name || '未選擇路線')} 座位表</text>
                    <rect x="${pad - 8}" y="${headerH - 12}" width="${gridW + 16}" height="${gridH + 24}" rx="16" fill="#f3f4f6" stroke="#d1d5db" stroke-width="4"/>
                    ${seatMarkup}
                </svg>`;
            };
            const handleExportSeatPdf = () => {
                const svg = buildSeatExportSvg();
                const html = `<!DOCTYPE html>
                <html lang="zh-Hant">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>${escapeExportText(currentRoute?.name || '座位表')} 座位表</title>
                    <style>
                        body { margin:0; background:#fff; font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",Arial,sans-serif; }
                        .wrap { display:flex; justify-content:center; padding:8mm; }
                        svg { max-width:190mm; height:auto; }
                        @page { size:A4 portrait; margin:8mm; }
                        @media print {
                            .wrap { padding:0; }
                            svg { max-height:280mm; max-width:190mm; }
                        }
                    </style>
                </head>
                <body>
                    <div class="wrap">${svg}</div>
                    <script>window.onload = () => setTimeout(() => window.print(), 500);<\/script>
                </body>
                </html>`;
                const url = URL.createObjectURL(new Blob(['\ufeff', html], { type: 'text/html;charset=utf-8' }));
                const win = window.open(url, '_blank');
                if (!win) return ctx.showMessage('請允許瀏覽器開啟新視窗，再重新匯出座位表', 'error');
                setTimeout(() => URL.revokeObjectURL(url), 60000);
                ctx.showMessage('列印版座位表已開啟，可另存為 PDF');
            };
            const handleExportSeatImage = () => {
                const svg = buildSeatExportSvg();
                const blob = new Blob(['\ufeff', svg], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth || img.width;
                        canvas.height = img.naturalHeight || img.height;
                        const canvasCtx = canvas.getContext('2d');
                        canvasCtx.fillStyle = '#ffffff';
                        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                        canvasCtx.drawImage(img, 0, 0);
                        const link = document.createElement('a');
                        link.download = buildSeatExportFileName('jpg');
                        link.href = canvas.toDataURL('image/jpeg', 0.95);
                        document.body.appendChild(link);
                        link.click();
                        link.remove();
                        ctx.showMessage('座位表 JPG 圖片已下載');
                    } catch (err) {
                        console.error(err);
                        ctx.showMessage('座位表 JPG 匯出失敗', 'error');
                    } finally {
                        URL.revokeObjectURL(url);
                    }
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    ctx.showMessage('座位表 JPG 匯出失敗', 'error');
                };
                img.src = url;
            };

            return (
                <div className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6">
                    <div className="flex-1 bg-white rounded-xl shadow-md border border-gray-100 p-6">
                        <div className="flex flex-col gap-3 mb-6 sm:flex-row sm:items-center sm:justify-between">
                            <h2 className="text-xl font-bold flex items-center"><i className="ph-fill ph-grid-four text-indigo-600 mr-2"></i> 座位配置</h2>
                            <div className="flex flex-col gap-2 sm:flex-row sm:items-center">
                                <button
                                    onClick={() => setPrivacyMode(!privacyMode)}
                                    className={`inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-bold transition ${privacyMode ? 'bg-emerald-100 text-emerald-700 border border-emerald-200 hover:bg-emerald-200' : 'bg-gray-100 text-gray-700 border border-gray-200 hover:bg-gray-200'}`}
                                    title={privacyMode ? '恢復顯示完整姓名' : '將座位表姓名中間一字改成 ○，方便公布給家長'}
                                >
                                    <i className={`ph-bold ${privacyMode ? 'ph-eye' : 'ph-eye-slash'}`}></i>
                                    {privacyMode ? '顯示完整姓名' : '公開座位表'}
                                </button>
                                <button onClick={handleExportSeatPdf} className="inline-flex items-center justify-center gap-2 rounded-lg border border-red-200 bg-red-50 px-4 py-2 text-sm font-bold text-red-700 transition hover:bg-red-100" title="開啟列印版，可另存 PDF">
                                    <i className="ph-bold ph-printer"></i>列印/PDF
                                </button>
                                <button onClick={handleExportSeatImage} className="inline-flex items-center justify-center gap-2 rounded-lg border border-blue-200 bg-blue-50 px-4 py-2 text-sm font-bold text-blue-700 transition hover:bg-blue-100" title="下載 JPG 圖片">
                                    <i className="ph-bold ph-image"></i>圖片JPG
                                </button>
                                <select value={routeId} onChange={e=>{ setRouteId(e.target.value); setSelectedSeat(null); }} className="px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 outline-none">{seatingVehicles.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select>
                            </div>
                        </div>
                        {privacyMode && <div className="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-2 text-sm font-bold text-emerald-700"><i className="ph-fill ph-shield-check mr-1"></i>公開顯示中：姓名已隱藏中間一字，只影響畫面，不會修改學生資料。</div>}
                        <div className="mb-4 rounded-lg border border-blue-100 bg-blue-50 px-4 py-2 text-sm leading-6 text-blue-800">
                            <i className={`ph-fill ${isAfternoonVehicle ? 'ph-sun' : 'ph-arrows-left-right'} mr-1`}></i>{isAfternoonVehicle ? `環線座位：只顯示已固定安排到${afternoonVehicleName}的學生；此座位表獨立於早上各路線。` : '跨線排座：可把其他路線學生拖到目前這台車，學生原本報名路線不會被改，只會記錄實際座位。'}
                        </div>
                        <div id="seat-export-source" className="bg-gray-100 rounded-2xl p-6 border-4 border-gray-200 overflow-x-auto">
                            <div className="min-w-[320px] max-w-lg mx-auto bg-white p-4 rounded-xl shadow-sm">
                                <div className="w-full h-4 bg-gray-300 rounded-t-full mb-4"></div>
                                <div className="grid grid-cols-5 gap-y-3 gap-x-2 relative group" style={{ gridAutoRows: '4rem' }}>
                                    {SHARED_SEAT_LAYOUT.map((item, i) => {
                                        if (item.type === 'empty') return <div key={item.id || i} className="h-full min-h-16" style={getSeatCellStyle(item)}></div>;
                                        if (item.type !== 'seat') return <div key={item.id} style={getSeatCellStyle(item)} className="flex h-full min-h-16 items-center justify-center bg-gray-200 border-2 rounded-lg shadow-inner font-bold text-gray-600 text-sm">{item.label}</div>;

                                        const sd = currentSeating[item.id], s = sd ? ctx.students.find(st=>st.id===sd.studentId) : null, isSel = selectedSeat === item.id;
                                        const isCross = isCrossRouteStudent(s);
                                        const seatNo = getShortSeatLabel(item.id, item.label);
                                        return (
                                            <div
                                                key={item.id}
                                                onDragOver={(e) => e.preventDefault()}
                                                onDrop={(e) => handleDrop(e, item.id)}
                                                draggable={!!s}
                                                onDragStart={(e) => { if(s) e.dataTransfer.setData('seatId', item.id); }}
                                                onClick={()=>handleSeatClick(item)}
                                                title={s ? `${displayStudentName(s)}｜${getRouteName(s.routeId)}｜${s.stopName || ''}${s.seatNote ? `｜備註：${s.seatNote}` : ''}` : item.label}
                                                style={getSeatCellStyle(item)}
                                                className={`relative flex h-full min-h-16 flex-col items-center justify-center border-2 rounded-lg cursor-pointer transition-all ${s ? (sd.color||'bg-gray-100') : 'bg-white border-dashed'} ${isSel ? 'ring-4 ring-indigo-500 shadow-lg scale-105 z-10' : ''}`}
                                            >
                                                {s ? <>
                                                    <div className="absolute left-1 top-1 rounded bg-white/80 px-1 text-[9px] font-black leading-4 text-gray-700 shadow-sm">{seatNo}</div>
                                                    {sd.locked && <i className="ph-fill ph-lock-key absolute top-5 left-1 text-[11px] text-gray-700"></i>}
                                                    {sd.color === CAPTAIN_SEAT_COLOR && <i className="ph-fill ph-star absolute top-1 right-1 text-[11px] text-amber-700"></i>}
                                                    {isCross && <div className="absolute -top-2 left-1/2 -translate-x-1/2 rounded-full bg-orange-500 px-1.5 py-0.5 text-[9px] font-bold text-white shadow">跨線</div>}
                                                    <div className="text-[11px] font-bold truncate px-1 w-full text-center">{displayStudentName(s)}</div>
                                                    <div className="text-[9px] truncate px-1 w-full text-center opacity-75">{sd.assignedStopName || s.stopName || ''}</div>
                                                    {isCross && <div className="text-[8px] truncate px-1 w-full text-center font-bold text-orange-700">{getRouteName(s.routeId)}</div>}
                                                    {s.seatNote && <div className="mt-0.5 rounded bg-white/70 px-1 text-[9px] font-bold">備註</div>}
                                                    <div className="seat-export-hide absolute -bottom-2 left-1/2 flex -translate-x-1/2 gap-1 opacity-80 hover:opacity-100">
                                                        <button onClick={(e)=>toggleSeatLock(item.id, e)} className={`rounded-full p-0.5 text-white ${sd.locked ? 'bg-gray-700' : 'bg-indigo-500'}`} title={sd.locked ? '取消鎖定' : '鎖定座位'}><i className={`ph-bold ${sd.locked ? 'ph-lock-key-open' : 'ph-lock-key'} text-xs`}></i></button>
                                                        <button onClick={(e)=>removeSeat(item.id, e)} className="rounded-full bg-red-500 p-0.5 text-white" title="移出座位"><i className="ph-bold ph-x text-xs"></i></button>
                                                    </div>
                                                </> : <span className="text-gray-300 text-[10px] font-medium leading-tight text-center">{item.label}</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="w-full h-4 bg-gray-300 rounded-b-full mt-4"></div>
                            </div>
                        </div>
                    </div>

                    <div className="w-full lg:w-80 flex flex-col gap-6">
                        <div className="bg-white rounded-xl shadow-md p-5 border border-gray-100">
                            <div className="mb-3 border-b pb-3 space-y-3">
                                <h3 className="font-bold flex justify-between">未安排學生<span className="text-red-600 text-xs">{unassignedStudents.length}人</span></h3>
                                <select value={studentPoolRouteId} onChange={e => setStudentPoolRouteId(e.target.value)} className="w-full rounded-lg border bg-white px-3 py-2 text-sm font-bold text-gray-700 focus:ring-2 outline-none">
                                    {studentPoolRoutes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                </select>
                            </div>
                            <div className="flex flex-wrap gap-2 max-h-60 overflow-y-auto pr-1">
                                {unassignedStudents.map(s => (
                                    <div
                                        key={s.id}
                                        draggable
                                        onDragStart={(e) => e.dataTransfer.setData('studentId', s.id)}
                                        title={s.seatNote || ''}
                                        className={`px-3 py-1.5 rounded-xl text-xs font-bold cursor-grab active:cursor-grabbing border shadow-sm hover:shadow transition ${s.gender === '男' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-pink-50 text-pink-700 border-pink-200'}`}
                                    >
                                        <div>{displayStudentName(s)} ({s.class})</div>
                                        <div className="font-normal opacity-75">{getRouteName(s.routeId)}｜{s.stopName}</div>
                                        {isCrossRouteStudent(s) && <div className="mt-1 inline-flex rounded bg-orange-100 px-1 py-0.5 text-[10px] font-bold text-orange-700">跨線到目前車輛</div>}
                                        {s.seatNote && <div className="mt-1 max-w-[12rem] truncate rounded bg-white/70 px-1 py-0.5 text-[10px] text-gray-600">備註：{s.seatNote}</div>}
                                    </div>
                                ))}
                                {unassignedStudents.length === 0 && <span className="text-gray-400 text-sm">目前篩選沒有未安排學生</span>}
                            </div>
                            <p className="text-xs text-gray-500 mt-4 leading-relaxed bg-gray-50 p-2 rounded"><i className="ph-bold ph-hand-pointing mr-1"></i><strong>拖曳模式：</strong>直接將上方晶片拖入左側空位，或拖拉左側已入座學生互換位置。</p>
                        </div>
                        <div className="bg-white rounded-xl shadow-md p-5 border border-gray-100">
                            <button onClick={handleAutoAssign} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-md transition">一鍵自動排座</button>
                            <p className="mt-3 text-xs leading-5 text-gray-500">規則：保留目前已安排座位，只排{isAfternoonVehicle ? '本環線' : '本路線'}尚未入座學生；備註有暈車或前排需求者優先前排；兄妹偏男生側，姊弟／姐弟偏女生側；其餘依車站順序排序，男生優先左側、女生優先右側。</p>
                            <div className="mt-4 border-t pt-4">
                                <button onClick={handleClearRouteSeating} className="w-full rounded-xl border border-red-200 bg-red-50 py-3 font-bold text-red-600 transition hover:bg-red-100">
                                    <i className="ph-bold ph-eraser mr-1"></i>清空本{isAfternoonVehicle ? '環線' : '路線'}座位
                                </button>
                                <p className="mt-2 text-xs leading-5 text-gray-500">只撤除目前選取車輛的座位安排，學生報名資料、環線調度與路線資料都會保留。</p>
                            </div>
                        </div>
                        <div className="bg-white rounded-xl shadow-md p-5 border border-gray-100">
                            <h3 className="font-bold mb-2 border-b pb-2"><i className="ph-fill ph-shield-check text-emerald-600 mr-1"></i>公布座位表</h3>
                            <p className="text-xs leading-5 text-gray-500">按「公開座位表」後，座位上的姓名會改成王○明、張○祥這種格式，方便截圖或公布給家長。這只是畫面顯示，不會改掉後台資料。</p>
                        </div>
                        <div className="bg-white rounded-xl shadow-md p-5 border border-gray-100"><h3 className="font-bold mb-3 border-b pb-2">座位標記顏色</h3><div className="flex flex-wrap gap-2">
                            <button onClick={()=>setActiveColor(activeColor===CAPTAIN_SEAT_COLOR?null:CAPTAIN_SEAT_COLOR)} className={`rounded-lg border-2 px-3 py-2 text-xs font-bold ${CAPTAIN_SEAT_COLOR} ${activeColor===CAPTAIN_SEAT_COLOR?'ring-4 ring-offset-2 ring-indigo-400':''}`}><i className="ph-fill ph-star mr-1"></i>車上幹部</button>
                            {['bg-red-100 border-red-300 text-red-800', 'bg-green-100 border-green-300 text-green-800', 'bg-gray-200 border-gray-400 text-gray-800'].map(c => <button key={c} onClick={()=>setActiveColor(activeColor===c?null:c)} className={`w-8 h-8 rounded-full border-2 ${c} ${activeColor===c?'ring-4 ring-offset-2 ring-indigo-400':''}`}></button>)}
                            <button onClick={()=>setActiveColor(null)} className="px-2 py-1 text-xs rounded border">取消</button>
                        </div><p className="mt-3 text-xs text-gray-500">選擇顏色後，點座位即可標記；同一顏色再點一次會取消並回到原本性別顏色。</p></div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isMasterReady, setIsMasterReady] = useState(false);
            const [masterConfig, setMasterConfig] = useState(null);
            const [systemError, setSystemError] = useState(null);

            const [currentPage, setCurrentPage] = useState('register');
            const [isCaptainLoggedIn, setIsCaptainLoggedIn] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [message, setMessage] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);

            const [routes, setRoutes] = useState([]);
            const [studentsPublic, setStudentsPublic] = useState([]);
            const [studentsPrivate, setStudentsPrivate] = useState([]);
            const [leaves, setLeaves] = useState([]);
            const [attendanceRecords, setAttendanceRecords] = useState([]);
            const [afternoonLoopAssignments, setAfternoonLoopAssignments] = useState([]);
            const [seatingArrangements, setSeatingArrangements] = useState({});
            const [appConfig, setAppConfig] = useState({ adminPasswordHash: '', rollCallPasswordHash: '', addressRegions: DEFAULT_ADDRESS_REGIONS, registrationNotice: DEFAULT_REGISTRATION_NOTICE, surveyQuestions: [], surveyQuestionsConfigured: true, surveyTitle: DEFAULT_SURVEY_TITLE, surveyDescription: DEFAULT_SURVEY_DESCRIPTION, surveyNoteLabel: DEFAULT_SURVEY_NOTE_LABEL, surveyNoteEnabled: true, returnOptions: DEFAULT_RETURN_OPTIONS, registrationClosed: false, registrationDeadline: '', rollCallClosed: false, rollCallStartDate: '', rollCallEndDate: '' });

            // 1. 初始化 Auth 與全域主控設定 (Master Config)
            useEffect(() => {
                let initialized = false;
                const unsubscribeAuth = onAuthStateChanged(auth, async activeUser => {
                    setUser(activeUser);
                    if (activeUser || initialized) return;
                    initialized = true;
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth Error", e);
                        setSystemError("Firebase 登入失敗，請確認網路連線、Firebase Authentication 匿名登入，以及授權網域設定。");
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            // 後台權限直接由 Firebase 目前登入的 Google 帳號判定，不另存一份容易不同步的畫面狀態。
            const isAdminLoggedIn = isSchoolAdminEmail(user?.email);

            useEffect(() => {
                if (isAdminLoggedIn) {
                    setIsCaptainLoggedIn(true);
                    setCurrentPage('admin');
                }
            }, [isAdminLoggedIn]);

            // 讀取主控設定，強制鎖定在 appId 的合法路徑下
            useEffect(() => {
                if (!user) return;
                const masterConfigRef = doc(db, 'artifacts', 'changan-master-config', 'public', 'data', 'system', 'config');
                const unsubscribeMaster = onSnapshot(masterConfigRef, snap => {
                    setSystemError(null);
                    if (snap.exists()) {
                        setMasterConfig(snap.data());
                        setIsMasterReady(true);
                    } else {
                        setIsMasterReady(false);
                        setSystemError("主控設定不存在。系統已停止自動建立預設期程，避免覆蓋或切換到錯誤資料。請到 Firebase 檢查 artifacts/changan-master-config/public/data/system/config。");
                    }
                }, error => {
                    console.error(error);
                    setSystemError("主控設定讀取失敗，請確認 Firestore 規則與 artifacts/changan-master-config/public/data/system/config 是否可存取。");
                });
                return () => unsubscribeMaster();
            }, [user]);

            // 輔助函式：自前端整批抓取的資料中過濾當前 Session 專屬文件並映射還原其原始 ID
            const filterAndMapSessionDocs = (docs, sessionId) => {
                const prefix = `${sessionId}_`;
                return docs
                    .filter(d => d.id.startsWith(prefix))
                    .map(d => ({
                        ...d.data(),
                        id: d.id.slice(prefix.length)
                    }));
            };

            // 2. 監聽當前期程 (Active Session) 的動態資料，全部收納在合法的 appId 下
            useEffect(() => {
                if (!user || !isMasterReady || !masterConfig?.activeSessionId) return;
                const sessionId = masterConfig.activeSessionId;

                const canSeeRoster = isAdminLoggedIn || isCaptainLoggedIn;
                let uPublic = () => {};
                let uLeaves = () => {};
                let uAttendance = () => {};
                let uAfternoonLoop = () => {};
                let uSeating = () => {};
                if (canSeeRoster) {
                    uPublic = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students_public'), snap => {
                        setStudentsPublic(filterAndMapSessionDocs(snap.docs, sessionId));
                    }, console.error);

                    uLeaves = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'leaves'), snap => {
                        setLeaves(filterAndMapSessionDocs(snap.docs, sessionId));
                    }, console.error);

                    uAttendance = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendanceRecords'), snap => {
                        setAttendanceRecords(filterAndMapSessionDocs(snap.docs, sessionId));
                    }, console.error);

                    uAfternoonLoop = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'afternoonLoopAssignments'), snap => {
                        setAfternoonLoopAssignments(filterAndMapSessionDocs(snap.docs, sessionId));
                    }, console.error);

                    uSeating = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'seatingArrangements'), snap => {
                        const mapped = filterAndMapSessionDocs(snap.docs, sessionId);
                        const dict = {};
                        mapped.forEach(d => { dict[d.id] = d; });
                        setSeatingArrangements(dict);
                    }, console.error);
                } else {
                    setStudentsPublic([]);
                    setLeaves([]);
                    setAttendanceRecords([]);
                    setAfternoonLoopAssignments([]);
                    setSeatingArrangements({});
                }

                const uRoutes = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'routes'), snap => {
                    const mapped = filterAndMapSessionDocs(snap.docs, sessionId);
                    if (mapped.length === 0) {
                        if (isAdminLoggedIn) {
                            INITIAL_ROUTES.forEach(r => {
                                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'routes', `${sessionId}_${r.id}`), {
                                    ...r,
                                    sessionId: sessionId
                                });
                            });
                        }
                    } else {
                        setRoutes(mapped);
                    }
                }, console.error);

                let systemConfigData = {};
                let publicConfigData = {};
                let sessionFormConfigData = null;
                const baseAppConfig = {
                    adminPasswordHash: '',
                    rollCallPasswordHash: '',
                    addressRegions: DEFAULT_ADDRESS_REGIONS,
                    registrationNotice: DEFAULT_REGISTRATION_NOTICE,
                    surveyQuestions: [],
                    surveyQuestionsConfigured: true,
                    surveyTitle: DEFAULT_SURVEY_TITLE,
                    surveyDescription: DEFAULT_SURVEY_DESCRIPTION,
                    surveyNoteLabel: DEFAULT_SURVEY_NOTE_LABEL,
                    surveyNoteEnabled: true,
                    returnOptions: DEFAULT_RETURN_OPTIONS,
                    registrationClosed: false,
                    registrationDeadline: '',
                    rollCallClosed: false,
                    rollCallStartDate: '',
                    rollCallEndDate: ''
                };
                const sessionFormConfigRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', `${sessionId}_main`);
                const applyConfig = () => {
                    setAppConfig({
                        ...baseAppConfig,
                        ...publicConfigData,
                        ...systemConfigData,
                        ...(sessionFormConfigData || {})
                    });
                };
                const uPublicConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'public'), docSnap => {
                    publicConfigData = docSnap.exists() ? { addressRegions: normalizeAddressRegions(docSnap.data().addressRegions) } : {};
                    applyConfig();
                }, console.error);
                let uConfig = () => {};
                if (isAdminLoggedIn) {
                    uConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), docSnap => {
                        if (docSnap.exists()) {
                            const rawSystemConfig = docSnap.data();
                            systemConfigData = {
                                adminPasswordHash: rawSystemConfig.adminPasswordHash || '',
                                rollCallPasswordHash: rawSystemConfig.rollCallPasswordHash || ''
                            };
                        } else {
                            systemConfigData = {};
                        }
                        applyConfig();
                    }, console.error);
                }

                const uSessionConfig = onSnapshot(sessionFormConfigRef, docSnap => {
                    if (docSnap.exists()) {
                        sessionFormConfigData = docSnap.data();
                        applyConfig();
                    } else {
                        sessionFormConfigData = {};
                        applyConfig();
                    }
                }, console.error);

                return () => { uPublic(); uLeaves(); uAttendance(); uAfternoonLoop(); uSeating(); uRoutes(); uPublicConfig(); uConfig(); uSessionConfig(); };
            }, [user, isMasterReady, masterConfig?.activeSessionId, isAdminLoggedIn, isCaptainLoggedIn]);

            // 3. 監聽私有資料 (僅管理員)
            useEffect(() => {
                if (!user || !isMasterReady || !masterConfig?.activeSessionId || !isAdminLoggedIn) { setStudentsPrivate([]); return; }
                const sessionId = masterConfig.activeSessionId;
                const uPrivate = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students_private'), snap => {
                    setStudentsPrivate(filterAndMapSessionDocs(snap.docs, sessionId));
                }, console.error);
                return () => uPrivate();
            }, [user, isMasterReady, masterConfig?.activeSessionId, isAdminLoggedIn]);

            const students = useMemo(() => {
                if (!isAdminLoggedIn) return dedupeLatestStudents(studentsPublic);
                const merged = studentsPublic.map(pub => {
                    const priv = studentsPrivate.find(p => p.id === pub.id) || {};
                    return { ...pub, ...priv, dedupeKey: pub.dedupeKey || priv.dedupeKey };
                });
                return dedupeLatestStudents(merged);
            }, [studentsPublic, studentsPrivate, isAdminLoggedIn]);

            const routeCounts = useMemo(() => {
                const counts = {};
                dedupeLatestStudents(studentsPublic).forEach(s => { counts[s.routeId] = (counts[s.routeId] || 0) + 1; });
                return counts;
            }, [studentsPublic]);
            const activeRoutes = useMemo(() => routes.filter(r => r.active !== false), [routes]);

            const showMessage = (text, type = 'success') => { setMessage({ text, type }); setTimeout(() => setMessage(null), 3000); };
            const showConfirm = (msg, action) => { setConfirmDialog({ msg, action: () => { action(); setConfirmDialog(null); } }); };
            const signInSchoolAdmin = async (expectedEmail) => {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ login_hint: expectedEmail, hd: SCHOOL_ADMIN_DOMAIN });
                // 使用同頁跳轉，避免部分瀏覽器將 Firebase 處理頁留成空白分頁。
                await signInWithRedirect(auth, provider);
            };
            const signOutAdmin = async () => {
                await signOut(auth);
                setIsCaptainLoggedIn(false);
                // 登出後立即回到家長可使用的匿名身分，避免同一台電腦的家長頁面無法載入資料。
                await signInAnonymously(auth);
                showMessage('已安全登出');
            };

            // 封裝動態路徑，使其格式完全符合安全規格限制
            const getDocRef = (colName, docId) => {
                return doc(db, 'artifacts', appId, 'public', 'data', colName, `${masterConfig.activeSessionId}_${docId}`);
            };
            const getCollectionRef = (colName) => {
                return collection(db, 'artifacts', appId, 'public', 'data', colName);
            };
            const getParentQueryRef = (lookupKey) => {
                return doc(db, 'artifacts', appId, 'public', 'data', 'parent_queries', `${masterConfig.activeSessionId}_${lookupKey}`);
            };
            const findParentQueryByLookupKey = async (lookupKey) => {
                if (!masterConfig?.activeSessionId || !lookupKey) return null;
                const snap = await getDoc(getParentQueryRef(lookupKey));
                return snap.exists() ? snap.data() : null;
            };
            const upsertParentQuerySummary = async (lookupKey, summary) => {
                if (!masterConfig?.activeSessionId || !lookupKey || !summary?.id) return;
                const ref = getParentQueryRef(lookupKey);
                const snap = await getDoc(ref);
                const students = { ...(snap.exists() ? (snap.data().students || {}) : {}), [summary.id]: summary };
                await setDoc(ref, {
                    sessionId: masterConfig.activeSessionId,
                    lookupKey,
                    students,
                    updatedAt: Date.now()
                }, { merge: true });
            };
            const querySessionDocsByField = async (colName, fieldName, value) => {
                if (!masterConfig?.activeSessionId || value === undefined || value === null || value === '') return [];
                const snap = await getDocs(query(getCollectionRef(colName), where(fieldName, '==', value)));
                return filterAndMapSessionDocs(snap.docs, masterConfig.activeSessionId);
            };
            const countPublicStudentsByRoute = async (routeId) => {
                const matches = await querySessionDocsByField('students_public', 'routeId', routeId);
                return dedupeLatestStudents(matches).length;
            };

            useEffect(() => {
                if (!user || !isMasterReady || !masterConfig?.activeSessionId || !isAdminLoggedIn) return;
                const publicById = new Map(studentsPublic.map(s => [s.id, s]));
                const targets = studentsPrivate
                    .filter(priv => priv.parentName && priv.parentMobile)
                    .map(priv => ({ priv, pub: publicById.get(priv.id) }))
                    .filter(({ pub }) => pub)
                    .filter(({ priv, pub }) => {
                        if (!pub.lookupKey) return true;
                        const expectedDedupeKey = createStudentDedupeKey({ ...pub, ...priv, lookupKey: pub.lookupKey });
                        return expectedDedupeKey && pub.dedupeKey !== expectedDedupeKey;
                    });
                if (targets.length === 0) return;
                (async () => {
                    try {
                        await Promise.all(targets.map(async ({ priv, pub }) => {
                            const lookupKey = await buildLookupKey(priv.parentName, priv.parentMobile);
                            if (!lookupKey) return null;
                            const dedupeKey = createStudentDedupeKey({ ...pub, ...priv, lookupKey });
                            return setDoc(getDocRef('students_public', priv.id), { lookupKey, dedupeKey }, { merge: true });
                        }));
                    } catch (err) {
                        console.error('lookup index backfill failed', err);
                    }
                })();
            }, [user, isMasterReady, masterConfig?.activeSessionId, isAdminLoggedIn, studentsPublic, studentsPrivate]);

            const canSeeRoster = isAdminLoggedIn || isCaptainLoggedIn;
            const ctx = { user, routes, activeRoutes, students, studentsPublic: dedupeLatestStudents(studentsPublic), rawStudentsPublic: studentsPublic, leaves, attendanceRecords, afternoonLoopAssignments, seatingArrangements, appConfig, masterConfig, isAdminLoggedIn, isCaptainLoggedIn, setIsCaptainLoggedIn, setCurrentPage, showMessage, showConfirm, signInSchoolAdmin, signOutAdmin, hashPassword, getDocRef, routeCounts, canSeeRoster, findParentQueryByLookupKey, upsertParentQuerySummary, countPublicStudentsByRoute };

            const renderContent = () => {
                switch (currentPage) {
                    case 'register': return <RegisterPage ctx={ctx} />;
                    case 'lookup': return <LookupPage ctx={ctx} />;
                    case 'leave': return <LeavePage ctx={ctx} />;
                    case 'rollcall': return <RollCallPage ctx={ctx} />;
                    case 'admin': return <AdminPage ctx={ctx} />;
                    default: return <RegisterPage ctx={ctx} />;
                }
            };

            if (systemError) return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-6">
                    <div className="w-full max-w-lg bg-white border border-red-100 shadow-lg rounded-xl p-6 text-center">
                        <i className="ph-fill ph-warning-circle text-red-500 text-5xl"></i>
                        <h1 className="mt-4 text-xl font-bold text-gray-900">系統暫時無法載入</h1>
                        <p className="mt-3 text-sm leading-6 text-gray-600">{systemError}</p>
                        <button onClick={() => window.location.reload()} className="mt-5 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-bold text-white hover:bg-indigo-700">重新整理</button>
                    </div>
                </div>
            );

            if (!isMasterReady) return <div className="flex h-screen items-center justify-center bg-gray-50"><i className="ph-fill ph-bus animate-bounce text-indigo-600 text-5xl"></i></div>;

            return (
                <div className="min-h-screen bg-gray-50 font-sans">
                    <Navbar ctx={ctx} currentPage={currentPage} setCurrentPage={setCurrentPage} setShowLoginModal={setShowLoginModal} />
                    <main className="pb-10 pt-4">{renderContent()}</main>
                    <LoginModal ctx={ctx} showLoginModal={showLoginModal} setShowLoginModal={setShowLoginModal} setCurrentPage={setCurrentPage} />
                    <ConfirmModalUI confirmDialog={confirmDialog} setConfirmDialog={setConfirmDialog} />
                    {message && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-[100] transition-all flex items-center space-x-2 ${message.type === 'error' ? 'bg-red-600' : 'bg-gray-800'} text-white`}>
                            {message.type === 'success' ? <i className="ph-fill ph-check-circle text-xl text-green-400"></i> : <i className="ph-fill ph-x-circle text-xl"></i>}
                            <span className="font-medium">{message.text}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
